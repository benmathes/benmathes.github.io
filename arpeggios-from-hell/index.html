    for (let x = 0; x < row.length; x++) {
      const col = pal[row[x]];
      if (!col) continue;
      g.fillStyle = col;
      g.fillRect(x, y, 1, 1);
    }
  });
  return c;

// ---------------------------------------------------------------- audio ----
let AC = null, master, delaySend, muted = false;

function initAudio() {
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain();
  master.gain.value = 0.5;
  const comp = AC.createDynamicsCompressor();
  master.connect(comp);
  comp.connect(AC.destination);

  const delay = AC.createDelay(0.6);
  delay.delayTime.value = 0.22;
  const fb = AC.createGain();
  fb.gain.value = 0.32;
  delay.connect(fb); fb.connect(delay);
  delay.connect(master);
  delaySend = delay;

  noiseBuf = AC.createBuffer(1, AC.sampleRate * 0.1, AC.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
}
let noiseBuf = null;

const freqOf = m => 440 * Math.pow(2, (m - 69) / 12);

function lead(midi, t, dur) {
  const f = freqOf(midi);
  const flt = AC.createBiquadFilter();
  flt.type = 'lowpass';
  flt.Q.value = 3;
  flt.frequency.setValueAtTime(Math.min(f * 7, 9500), t);
  flt.frequency.exponentialRampToValueAtTime(Math.min(f * 2.5, 6000), t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 1.5);
  for (const det of [-7, 7]) {
    const o = AC.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = f;
    o.detune.value = det;
    o.connect(flt);
    o.start(t); o.stop(t + dur * 1.6);
  }
  flt.connect(g);
  g.connect(master);
  const send = AC.createGain();
  send.gain.value = 0.45;
  g.connect(send);
  send.connect(delaySend);
}

function bass(midi, t, dur) {
  const o = AC.createOscillator();
  o.type = 'triangle';
  o.frequency.value = freqOf(midi - 24);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.14, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + dur);
}

function kick(t) {
  const o = AC.createOscillator();
  o.frequency.setValueAtTime(130, t);
  o.frequency.exponentialRampToValueAtTime(38, t + 0.09);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.5, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.15);
}

function hat(t) {
  const s = AC.createBufferSource();
  s.buffer = noiseBuf;
  const f = AC.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 7000;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(t); s.stop(t + 0.05);
}

function powerChordSfx(t) {
  [45, 52, 57].forEach(m => {
    const o = AC.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = freqOf(m);
    const f = AC.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 2600; f.Q.value = 1;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.2, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    o.connect(f); f.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.75);
  });
  kick(t);
}

function pickJingle(t) {
  [69, 72, 76, 81].forEach((m, i) => lead(m, t + i * 0.06, 0.09));
}

function diveBomb(t) {
  const o = AC.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(660, t);
  o.frequency.exponentialRampToValueAtTime(70, t + 0.7);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.85);
}

function gliss(t, up) {
  const o = AC.createOscillator();
  o.type = 'square';
  o.frequency.setValueAtTime(up ? 300 : 900, t);
  o.frequency.exponentialRampToValueAtTime(up ? 900 : 300, t + 0.12);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.16);
}

function squeal(t) {
  const o = AC.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(1400, t);
  o.frequency.exponentialRampToValueAtTime(2600, t + 0.18);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.32);
}

function shimmer(t) {
  [76, 81, 88].forEach((m, i) => lead(m, t + i * 0.04, 0.12));
}

function roman(n) {
  const R = [[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let s = '';
  for (const [v, sym] of R) while (n >= v) { s += sym; n -= v; }
  return s;
}

  vibrato:   { name: 'WIDE VIBRATO', icon: WAVE_IC, max: 2,
    lines: ['graze radius +35%'] },
  goldtop:   { name: 'GOLD TOP', icon: STAR_IC, max: 2,
    lines: ['graze points +50%'] },
  halfstack: { name: 'HALF STACK', icon: AMP_IC, max: 3,
    lines: ['bullets 6% slower'] },
  lucky:     { name: 'LUCKY PICK', icon: PICK, max: 2,
    lines: ['12% chance a hit', 'counts as a graze'] },
  capo:      { name: 'CAPO', icon: NOTES[0], max: 3,
    lines: ['all points +20%'] },
  tube:      { name: 'TUBE WARMTH', icon: FERMATA, max: 2,
    lines: ['slow-mo lasts', '+1.5s longer'] },
  roadie:    { name: 'ROADIE', icon: PICK, max: 1,
    lines: ['picks heal', '+1 extra heart'] },
  encore:    { name: 'ENCORE', icon: STAR_IC, max: 1,
    lines: ['cheat death once:', 'revive w/ 2 hearts'] },
  trail:     { name: 'SCALLOPED TRAIL', icon: DASH_IC, max: 1, req: 'dash',
    lines: ['whammy dash clears', 'bullets in its path'] },
  floop:     { name: 'FEEDBACK LOOP', icon: WAVE_IC, max: 1,
    lines: ['a hit clears screen', '+ 2s slow-mo'] },
  ampfb:     { name: 'AMP FEEDBACK', icon: BOLT, max: 1, req: 'chord',
    lines: ['power chord also', 'slows time 3s'] },
  sympath:   { name: 'SYMPATHY STRINGS', icon: FERMATA, max: 1,
    lines: ['during slow-mo,', 'graze points x2'] },
};

// ---------------------------------------------------------------- state ----
const MIDI_LO = 50, MIDI_HI = 81;
const midiX = m => 14 + (m - MIDI_LO) / (MIDI_HI - MIDI_LO) * (W - 28);
const clampX = x => Math.max(8, Math.min(W - 8, x));
const clampY = y => Math.max(46, Math.min(PLAY_H - 10, y));

function segDist(a, b, p) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len2 = dx * dx + dy * dy;
  const t = len2 ? Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2)) : 0;
  return Math.hypot(p.x - (a.x + dx * t), p.y - (a.y + dy * t));
}

let state = 'title';          // title | play | draft | dead
let player, bullets, sparks, flames, spawnQueue;
let powers, powerTimer, slowUntil, shieldUntil, pinchUntil;
let score, best, lives, grazes, dodged, invulnUntil;
let level, barsThisLevel, bar, step, bpm, nextTime;
let actives, passives, draftCards, draftSel, openingPicks = 0;
let bannerText, bannerSub, bannerUntil;
let demon, shake, paused = false;
let lastDir = { x: 0, y: -1 };
let schedTimer = null;

best = loadBest();

const maxLives = () => Math.min(6, 3 + (passives.strings || 0));
const cdMul = () => Math.pow(0.88, passives.echo || 0);
function addScore(n) {
  score += n * DIFF().score * Math.pow(1.2, passives.capo || 0);
}

function reset() {
  player = { x: W / 2, y: PLAY_H - 44, focus: false };
  bullets = []; sparks = []; spawnQueue = [];
  powers = []; powerTimer = 8 * DIFF().power;
  slowUntil = 0; shieldUntil = 0; pinchUntil = 0;
  flames = [];
  for (let i = 0; i < 7; i++) {
    flames.push({ x: 16 + i * 34, seed: Math.random() * 9 });
  }
  score = 0; lives = 3; grazes = 0; dodged = 0; invulnUntil = 0;
  level = 1; barsThisLevel = 0; bar = 0; step = 0;
  bpm = levelBpm(1);
  actives = [{ id: 'dash', lv: 1, cdLeft: 0 }, null, null, null];
  passives = {};
  demon = { x: W / 2, tx: W / 2 };
  shake = 0;
  lastDir = { x: 0, y: -1 };
  banner('MOV. I: ' + moveName(1), moveSub(1));
}

function banner(txt, sub) {
  bannerText = txt;
  bannerSub = sub;
  bannerUntil = (AC ? AC.currentTime : 0) + 2.4;
}

// ------------------------------------------------------------- scheduler ---
function onBar() {
  bar++;
  barsThisLevel++;
  demon.tx = 40 + Math.random() * (W - 80);
  if (barsThisLevel >= BARS_PER_LEVEL) enterDraft();
}

function schedule() {
  if (state !== 'play' || paused) return;
  const stepDur = 60 / bpm / 4;
  while (nextTime < AC.currentTime + 0.15) {
    const chordName = (level >= 5 && bar % 4 === 3) ? 'dim' : PROG[bar % 4];
    const chord = CHORDS[chordName];
    const pat = chordName === 'dim' ? CLIMB : SWEEP;
    const midi = chord[pat[step] % chord.length];

    lead(midi, nextTime, stepDur * 1.1);
    if (step === 0) bass(chord[0], nextTime, stepDur * 8);
    if (step % 4 === 0) kick(nextTime);
    if (level >= 3 && step % 2 === 1) hat(nextTime);

    spawnQueue.push({ t: nextTime, midi, step, bar, chordName });

    step++;
    if (step === 16) { step = 0; onBar(); if (state !== 'play') return; }
    nextTime += stepDur;
  }
}

// --------------------------------------------------------------- spawning --
function toneIndex(midi, chord) {
  const i = chord.indexOf(midi);
  return i < 0 ? 3 : Math.min(i % 7 % 4, 3);
}

function spawnBullet(ev) {
  if (bullets.length > 380) return;
  const speed = (40 + level * 7) * DIFF().speed * Math.pow(0.94, passives.halfstack || 0);
  const mode = ev.bar % 3;
  let b;
  if (mode === 1) {
    const ox = demon.x - 8, oy = 34;
    const ang = Math.PI / 2 + (ev.midi - 66) / 34 * 1.15;
    b = { x: ox, y: oy, vx: Math.cos(ang) * speed * 1.1, vy: Math.sin(ang) * speed * 1.1 };
    sparks.push({ x: ox, y: oy, vx: 0, vy: -14, life: 0.3, col: '#ffd166', txt: '♪' });
  } else {
    const drift = mode === 2 ? Math.sin(ev.step * 0.8) * 14 : 0;
    b = { x: midiX(ev.midi), y: 30, vx: drift, vy: speed };
  }
  b.hot = false;
  if (level >= DIFF().aimLevel && ev.step % 8 === 0 && state === 'play') {
    const dx = player.x - demon.x, dy = player.y - 34;
    const d = Math.hypot(dx, dy) || 1;
    b = { x: demon.x - 8, y: 34, vx: dx / d * speed * 1.35, vy: dy / d * speed * 1.35, hot: true };
  }
  b.sprite = b.hot ? NOTE_HOT : NOTES[toneIndex(ev.midi, CHORDS[ev.chordName])];
  b.seed = Math.random() * 9;
  b.grazed = false;
  bullets.push(b);
}

// -------------------------------------------------------------- powerups ---
function spawnPower() {
  let type = ['pick', 'bolt', 'slow'][Math.floor(Math.random() * 3)];
  if (type === 'pick' && lives >= maxLives()) type = Math.random() < 0.5 ? 'bolt' : 'slow';
  powers.push({ x: 24 + Math.random() * (W - 48), y: -8, vy: 24, type, seed: Math.random() * 9 });
}

function collectPower(p) {
  const t = AC.currentTime;
  let txt, col;
  if (p.type === 'pick') {
    lives = Math.min(maxLives(), lives + 1 + (passives.roadie || 0));
    pickJingle(t);
    txt = '+1UP!'; col = '#4ecdc4';
  } else if (p.type === 'bolt') {
    bullets.forEach(b => {
      addScore(5);
      sparks.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5) * 40, vy: -30, life: 0.4, col: '#ffe066' });
    });
    bullets = [];
    powerChordSfx(t);
    shake = 0.25;
    txt = 'POWER CHORD!'; col = '#ffe066';
  } else {
    slowUntil = Math.max(slowUntil, t + 5 + 1.5 * (passives.tube || 0));
    diveBomb(t);
    txt = 'FERMATA!'; col = '#ffffff';
  }
  sparks.push({ x: player.x, y: player.y - 12, vx: 0, vy: -14, life: 1, col, txt });
}

// -------------------------------------------------------------- the draft --
function draftPool() {
  const pool = [];
  ACTIVES && Object.entries(ACTIVES).forEach(([id, def]) => {
    const owned = actives.find(a => a && a.id === id);
    if (owned && owned.lv < 3) {
      pool.push({ kind: 'upgrade', id, name: def.name, icon: def.icon,
                  lines: [def.up[owned.lv - 1]], tag: 'LV' + (owned.lv + 1) });
    } else if (!owned && actives.some(a => !a)) {
      pool.push({ kind: 'active', id, name: def.name, icon: def.icon,
                  lines: def.lines, tag: 'NEW' });
    }
  });
  Object.entries(PASSIVES).forEach(([id, def]) => {
    const count = passives[id] || 0;
    if (count >= def.max) return;
    if (def.req && !actives.find(a => a && a.id === def.req)) return;
    pool.push({ kind: 'passive', id, name: def.name, icon: def.icon,
                lines: def.lines, tag: count > 0 ? 'x' + (count + 1) : '' });
  });
  return pool;
}

function enterDraft() {
  // sweep the stage clean, with applause in points
  bullets.forEach(b => {
    addScore(2);
    sparks.push({ x: b.x, y: b.y, vx: (Math.random() - 0.5) * 30, vy: -25, life: 0.5, col: '#ffd166' });
  });
  bullets = [];
  spawnQueue = [];
  powers = [];

  const pool = draftPool();
  if (!pool.length) { nextLevel(); return; }
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  draftCards = pool.slice(0, 3);
  // early on, make sure the build can actually grow an arsenal
  const activesOwned = actives.filter(a => a).length;
  if (activesOwned < 2 && !draftCards.some(c => c.kind !== 'passive')) {
    const act = pool.find(c => c.kind !== 'passive');
    if (act) draftCards[0] = act;
  }
  draftSel = 0;
  state = 'draft';
  pickJingle(AC.currentTime);
}

function applyCard(card) {
  if (card.kind === 'active') {
    const slot = actives.findIndex(a => !a);
    actives[slot] = { id: card.id, lv: 1, cdLeft: 0 };
  } else if (card.kind === 'upgrade') {
    actives.find(a => a && a.id === card.id).lv++;
  } else {
    passives[card.id] = (passives[card.id] || 0) + 1;
    if (card.id === 'strings') lives = Math.min(maxLives(), lives + 1);
  }
  if (openingPicks > 0) {
    // the pre-show soundcheck: three picks before the first note flies
    openingPicks--;
    if (openingPicks > 0) enterDraft();
    else startPlay();
  } else {
    level++;
    startPlay();
  }
}

function startPlay() {
  barsThisLevel = 0;
  bpm = levelBpm(level);
  state = 'play';
  nextTime = AC.currentTime + 0.7;
  banner('MOV. ' + roman(level) + ': ' + moveName(level), moveSub(level));
}

// ----------------------------------------------------------------- skills --
function useSkill(i) {
  if (state !== 'play' || paused) return;
  const slot = actives[i];
  if (!slot || slot.cdLeft > 0) return;
  const def = ACTIVES[slot.id];
  def.use(slot.lv);
  slot.cdLeft = def.cds[slot.lv - 1] * cdMul();
}

// ----------------------------------------------------------------- input ---
const keys = {};
const SKILL_KEYS = { a: 0, s: 1, d: 2, f: 3 };
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(k)) e.preventDefault();
  if (k === 'm' && master) { muted = !muted; master.gain.value = muted ? 0 : 0.5; }
  if (k === 'p' && state === 'play') togglePause();
  if (state === 'play' && k in SKILL_KEYS && !e.repeat) useSkill(SKILL_KEYS[k]);
  if (state === 'title') {
    if (e.key === 'ArrowLeft') selectDiff(diffIdx - 1);
    if (e.key === 'ArrowRight') selectDiff(diffIdx + 1);
  }
  if (state === 'draft') {
    if (e.key === 'ArrowUp') draftSel = (draftSel + draftCards.length - 1) % draftCards.length;
    if (e.key === 'ArrowDown') draftSel = (draftSel + 1) % draftCards.length;
    if (k === 'z' || e.key === 'Enter') applyCard(draftCards[draftSel]);
    return;
  }
  if (state === 'dead' && k === 'x') state = 'title';
  if (k === 'z' || e.key === 'Enter') advance();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let touchId = null, touchLast = null;
cv.addEventListener('pointerdown', e => {
  const r = cv.getBoundingClientRect();
  const gx = (e.clientX - r.left) / r.width * W;
  const gy = (e.clientY - r.top) / r.height * H;
  if (state === 'title') {
    if (gy > 236 && gy < 262) {
      selectDiff(Math.min(2, Math.floor(gx / (W / 3))));
      return;
    }
  }
  if (state === 'draft') {
    const i = Math.floor((gy - 74) / 72);
    if (i >= 0 && i < draftCards.length) applyCard(draftCards[i]);
    return;
  }
  if (state === 'play' && gy > PLAY_H) {
    useSkill(Math.min(3, Math.floor(gx / (W / 4))));
    return;
  }
  advance();
  touchId = e.pointerId;
  touchLast = { x: e.clientX, y: e.clientY };
});
cv.addEventListener('pointermove', e => {
  if (e.pointerId !== touchId || !touchLast || state !== 'play') return;
  const scale = cv.clientWidth / W;
  const dx = (e.clientX - touchLast.x) / scale;
  const dy = (e.clientY - touchLast.y) / scale;
  player.x += dx;
  player.y += dy;
  if (dx || dy) {
    const d = Math.hypot(dx, dy);
    lastDir = { x: dx / d, y: dy / d };
  }
  touchLast = { x: e.clientX, y: e.clientY };
});
window.addEventListener('pointerup', () => { touchId = null; touchLast = null; });

function advance() {
  if (state === 'play' || state === 'draft') return;
  if (!AC) initAudio();
  AC.resume();
  reset();
  openingPicks = 3;
  enterDraft();
  if (!schedTimer) schedTimer = setInterval(schedule, 25);
}

function togglePause() {
  paused = !paused;
  if (paused) AC.suspend(); else { AC.resume(); nextTime = Math.max(nextTime, AC.currentTime + 0.1); }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden && state === 'play' && !paused) togglePause();
});

// ----------------------------------------------------------------- death ---
function die() {
  if (passives.encore) {
    passives.encore--;
    lives = 2;
    invulnUntil = AC.currentTime + 3;
    bullets = [];
    powerChordSfx(AC.currentTime);
    banner('ENCORE!', '(the crowd demands more)');
    return;
  }
  state = 'dead';
  if (score > best) { best = score; localStorage.setItem('arpeggios-from-hell-best-' + DIFF().id, best); }
  const t = AC.currentTime + 0.1;
  [76, 74, 71, 68].forEach((m, i) => lead(m, t + i * 0.28, 0.26));
  [57, 60, 64].forEach(m => bass(m + 12, t + 1.2, 1.4));
}

function hit() {
  const t = AC.currentTime;
  if ((passives.lucky || 0) > 0 && Math.random() < 0.12 * passives.lucky) {
    grazes++;
    addScore(25);
    sparks.push({ x: player.x, y: player.y - 10, vx: 0, vy: -16, life: 0.7, col: '#4ecdc4', txt: 'LUCKY!' });
    invulnUntil = Math.max(invulnUntil, t + 0.5);
    return;
  }
  lives--;
  shake = 0.35;
  invulnUntil = t + 2;
  if (passives.floop) {
    bullets.forEach(b => sparks.push({ x: b.x, y: b.y, vx: 0, vy: -20, life: 0.4, col: '#c792ea' }));
    bullets = [];
    slowUntil = Math.max(slowUntil, t + 2);
  } else {
    bullets = bullets.filter(b => Math.hypot(b.x - player.x, b.y - player.y) > 70);
  }
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    sparks.push({ x: player.x, y: player.y, vx: Math.cos(a) * 50, vy: Math.sin(a) * 50, life: 0.5, col: '#ff6b81' });
  }
  if (lives <= 0) die();
}

// ---------------------------------------------------------------- update ---
function update(dt) {
  const now = AC ? AC.currentTime : 0;
  const ts = AC && now < slowUntil ? 0.35 : 1;

  if (state === 'play') {
    while (spawnQueue.length && spawnQueue[0].t <= now + 0.02) {
      spawnBullet(spawnQueue.shift());
    }

    player.focus = keys['shift'];
    const sp = (player.focus ? 46 : 92) * (1 + 0.12 * (passives.metronome || 0));
    let mx = 0, my = 0;
    if (keys['arrowleft']) mx -= 1;
    if (keys['arrowright']) mx += 1;
    if (keys['arrowup']) my -= 1;
    if (keys['arrowdown']) my += 1;
    if (mx || my) {
      const d = Math.hypot(mx, my);
      lastDir = { x: mx / d, y: my / d };
      player.x += mx / d * sp * dt;
      player.y += my / d * sp * dt;
    }
    player.x = clampX(player.x);
    player.y = clampY(player.y);

    addScore(dt * 10 * level);

    demon.x += (demon.tx - demon.x) * Math.min(1, dt * 1.5);

    actives.forEach(a => { if (a && a.cdLeft > 0) a.cdLeft = Math.max(0, a.cdLeft - dt); });

    powerTimer -= dt;
    if (powerTimer <= 0) {
      spawnPower();
      powerTimer = (10 + Math.random() * 7) * DIFF().power * Math.pow(0.8, passives.groupie || 0);
    }
    for (let i = powers.length - 1; i >= 0; i--) {
      const p = powers[i];
      p.y += p.vy * dt * ts;
      p.x += Math.sin(now * 2 + p.seed) * 12 * dt;
      if (passives.magnet) {
        const dx = player.x - p.x, dy = player.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d < 90) {
          const pull = 55 * passives.magnet;
          p.x += dx / d * pull * dt;
          p.y += dy / d * pull * dt;
        }
      }
      if (p.y > PLAY_H + 10) { powers.splice(i, 1); continue; }
      if (Math.hypot(p.x - player.x, p.y - player.y) < 9) {
        collectPower(p);
        powers.splice(i, 1);
      }
    }

    const inv = now < invulnUntil;
    const grazeR = 11 * Math.pow(1.35, passives.vibrato || 0) * (now < pinchUntil ? 2 : 1);
    const grazePts = 25 * Math.pow(1.5, passives.goldtop || 0)
      * (now < pinchUntil ? 3 : 1)
      * (passives.sympath && now < slowUntil ? 2 : 1);
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx * dt * ts;
      b.y += b.vy * dt * ts;
      if (b.y > PLAY_H + 8 || b.y < -10 || b.x < -8 || b.x > W + 8) {
        bullets.splice(i, 1);
        dodged++;
        continue;
      }
      const d = Math.hypot(b.x - player.x, b.y - player.y);
      if (!inv && d < 4) { hit(); break; }
      if (!b.grazed && d < grazeR) {
        b.grazed = true;
        grazes++;
        addScore(grazePts);
        sparks.push({ x: player.x + (b.x - player.x) / 2, y: player.y + (b.y - player.y) / 2,
                      vx: 0, vy: -20, life: 0.4, col: '#ffe066', txt: '+' });
      }
    }
  }

  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx * dt; s.y += s.vy * dt; s.life -= dt;
    if (s.life <= 0) sparks.splice(i, 1);
  }
  shake = Math.max(0, shake - dt);
}

// ------------------------------------------------------------------ draw ---
function text(str, x, y, col, size = 8, align = 'center') {
  cx.font = size + 'px "Press Start 2P"';
  cx.textAlign = align;
  cx.fillStyle = col;
  cx.fillText(str, Math.round(x), Math.round(y));
}

function drawSkillBar(now) {
  cx.fillStyle = '#0e0718';
  cx.fillRect(0, PLAY_H, W, H - PLAY_H);
  cx.fillStyle = '#3a2352';
  cx.fillRect(0, PLAY_H, W, 1);
  const KEYS = ['A', 'S', 'D', 'F'];
  for (let i = 0; i < 4; i++) {
    const bx = 12 + i * 58, by = PLAY_H + 3, bs = 20;
    const slot = actives[i];
    cx.fillStyle = '#1c1030';
    cx.fillRect(bx, by, bs, bs);
    if (slot) {
      const def = ACTIVES[slot.id];
      const cd = def.cds[slot.lv - 1] * cdMul();
      const frac = slot.cdLeft / cd;
      cx.globalAlpha = frac > 0 ? 0.35 : 1;
      cx.drawImage(def.icon, bx + Math.floor((bs - def.icon.width) / 2),
                   by + Math.floor((bs - def.icon.height) / 2));
      cx.globalAlpha = 1;
      if (frac > 0) { // cooldown drains downward
        cx.fillStyle = 'rgba(23,11,36,0.75)';
        cx.fillRect(bx, by, bs, Math.ceil(bs * frac));
      } else if (Math.floor(now * 4) % 4 === 0) {
        cx.strokeStyle = def.col;
        cx.strokeRect(bx + 0.5, by + 0.5, bs - 1, bs - 1);
      }
      if (slot.lv > 1) text('' + slot.lv, bx + bs - 1, by + bs - 1, '#ffd166', 8, 'right');
    } else {
      cx.strokeStyle = '#3a2352';
      cx.strokeRect(bx + 0.5, by + 0.5, bs - 1, bs - 1);
    }
    text(KEYS[i], bx + bs / 2, 350, slot ? '#b58fd6' : '#4a3161', 8);
  }
}

function drawDraft(now) {
  cx.fillStyle = 'rgba(11,5,18,0.88)';
  cx.fillRect(0, 0, W, PLAY_H);
  if (openingPicks > 0) {
    text('BUILD YOUR RIG', W / 2, 38, '#ffd166', 16);
    text('pick ' + (4 - openingPicks) + ' of 3', W / 2, 56, '#b58fd6', 8);
  } else {
    text('MOVEMENT CLEAR', W / 2, 38, '#ffd166', 16);
    text('pick your gear', W / 2, 56, '#b58fd6', 8);
  }
  draftCards.forEach((c, i) => {
    const cy = 74 + i * 72;
    const sel = i === draftSel;
    cx.fillStyle = sel ? '#241238' : '#180d28';
    cx.fillRect(12, cy, W - 24, 62);
    cx.strokeStyle = sel ? '#ffd166' : '#3a2352';
    cx.strokeRect(12.5, cy + 0.5, W - 25, 61);
    cx.fillStyle = '#1c1030';
    cx.fillRect(18, cy + 8, 20, 20);
    cx.drawImage(c.icon, 18 + Math.floor((20 - c.icon.width) / 2),
                 cy + 8 + Math.floor((20 - c.icon.height) / 2));
    text(c.name, 44, cy + 16, sel ? '#ffffff' : '#b58fd6', 8, 'left');
    c.lines.forEach((ln, j) => text(ln, 44, cy + 33 + j * 13, '#8f77a8', 8, 'left'));
    if (c.tag) text(c.tag, W - 18, cy + 55, c.kind === 'passive' ? '#4ecdc4' : '#ffd166', 8, 'right');
    if (sel && Math.floor(now * 2) % 2 === 0) text('>', 2, cy + 36, '#ffd166', 8, 'left');
  });
  text('UP/DOWN + Z, or tap', W / 2, 306, '#6b4a8f', 8);
}

function draw() {
  const now = AC ? AC.currentTime : performance.now() / 1000;
  const beatDur = 60 / bpm;
  const bob = Math.sin(now / beatDur * Math.PI) * (1 + Math.min(6, level) * 0.5);

  cx.save();
  if (shake > 0) cx.translate((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4);

  const hellish = state === 'title' ? 0 : Math.min(1, (level - 1) / 6);
  cx.fillStyle = `rgb(${23 + hellish * 30},${11 - hellish * 4},${36})`;
  cx.fillRect(-4, -4, W + 8, PLAY_H + 8);

  cx.fillStyle = 'rgba(255,255,255,0.05)';
  for (let i = 0; i < 5; i++) cx.fillRect(0, 80 + i * 34, W, 1);

  flames.forEach(f => {
    const fy = PLAY_H - 10 + Math.sin(now * 4 + f.seed) * 2;
    cx.drawImage(FLAME, Math.round(f.x - 2), Math.round(fy - 6));
  });

  if (state === 'title') {
    cx.drawImage(DEMON, 0, 0, 24, 21, W / 2 - 36, 60 + Math.sin(now * 2) * 3, 72, 63);
    text('ARPEGGIOS', W / 2, 160, '#ffd166', 16);
    text('FROM HELL', W / 2, 184, '#ff6b81', 16);
    text('a very fast, very cute', W / 2, 210, '#b58fd6', 8);
    text('roguelike bullet hell', W / 2, 224, '#b58fd6', 8);
    DIFFS.forEach((d, i) => {
      const dx2 = W / 6 + i * (W / 3);
      const sel = i === diffIdx;
      text(sel ? '>' + d.name + '<' : d.name, dx2, 252, sel ? d.col : '#5a3a6e', 8);
    });
    text(DIFF().sub, W / 2, 266, DIFF().col, 8);
    if (best > 0) text('BEST ' + String(Math.floor(best)).padStart(6, '0'), W / 2, 281, DIFF().col, 8);
    if (Math.floor(now * 2) % 2 === 0) text('TAP OR PRESS Z TO SHRED', W / 2, 298, '#ffffff', 8);
    cx.restore();
    drawSkillBar(now);
    return;
  }

  const dx = Math.round(demon.x - 12), dy = Math.round(10 + bob);
  cx.drawImage(DEMON, dx, dy);

  powers.forEach(p => {
    const s = POWER_SPRITES[p.type];
    const pb = Math.sin(now * 3 + p.seed) * 1.5;
    cx.strokeStyle = 'rgba(255,255,255,' + (0.15 + 0.15 * Math.sin(now * 5 + p.seed)) + ')';
    cx.beginPath();
    cx.arc(Math.round(p.x), Math.round(p.y + pb), 8, 0, Math.PI * 2);
    cx.stroke();
    cx.drawImage(s, Math.round(p.x - s.width / 2), Math.round(p.y + pb - s.height / 2));
  });

  bullets.forEach(b => {
    const wob = Math.sin(now * 6 + b.seed) * 1.2;
    cx.drawImage(b.sprite, Math.round(b.x - 3 + wob), Math.round(b.y - 4));
  });

  const inv = AC && now < invulnUntil;
  if (!inv || Math.floor(now * 10) % 2 === 0) {
    cx.drawImage(IMP, Math.round(player.x - 5), Math.round(player.y - 6));
    if (player.focus) {
      cx.fillStyle = '#ffffff';
      cx.fillRect(Math.round(player.x) - 1, Math.round(player.y) - 1, 2, 2);
    }
  }
  if (AC && now < shieldUntil) {
    cx.strokeStyle = 'rgba(142,202,230,' + (0.5 + 0.3 * Math.sin(now * 12)) + ')';
    cx.beginPath();
    cx.arc(Math.round(player.x), Math.round(player.y), 10, 0, Math.PI * 2);
    cx.stroke();
  }

  sparks.forEach(s => {
    if (s.txt) {
      text(s.txt, s.x, s.y, s.col, 8);
    } else if (s.ring) {
      cx.strokeStyle = s.col;
      cx.globalAlpha = Math.max(0, s.life * 2.5);
      cx.beginPath();
      cx.arc(Math.round(s.x), Math.round(s.y), Math.max(2, s.ring * (1 - s.life * 2.5)), 0, Math.PI * 2);
      cx.stroke();
      cx.globalAlpha = 1;
    } else {
      cx.fillStyle = s.col;
      cx.fillRect(Math.round(s.x), Math.round(s.y), 2, 2);
    }
  });

  if (AC && now < slowUntil && state !== 'dead') {
    cx.fillStyle = 'rgba(120,180,255,0.08)';
    cx.fillRect(0, 0, W, PLAY_H);
  }

  // HUD
  text('SCORE ' + String(Math.floor(score)).padStart(6, '0'), 4, 12, '#ffd166', 8, 'left');
  const slots = Math.max(3, maxLives());
  for (let i = 0; i < slots; i++) {
    cx.drawImage(i < lives ? HEART : HEART_EMPTY, W - 3 - (slots - i) * 9, 5);
  }
  // movement label + bar progress, right of the score, left of the hearts
  text('MOV. ' + roman(level), 177, 12, 'rgba(181,143,214,0.9)', 8, 'right');
  cx.fillStyle = '#3a2352';
  cx.fillRect(117, 14, 60, 3);
  cx.fillStyle = '#ffd166';
  cx.fillRect(117, 14, Math.round(60 * Math.min(1, barsThisLevel / BARS_PER_LEVEL)), 3);

  if (AC && now < bannerUntil && state === 'play') {
    const big = level >= 7;
    text(bannerText, W / 2, 140, big ? '#ff3355' : '#ffffff', 8);
    text(bannerSub, W / 2, 158, '#b58fd6', 8);
  }

  if (state === 'draft') drawDraft(now);

  if (paused) {
    cx.fillStyle = 'rgba(11,5,18,0.7)';
    cx.fillRect(0, 0, W, PLAY_H);
    text('PAUSED', W / 2, PLAY_H / 2, '#ffffff', 16);
  }

  if (state === 'dead') {
    cx.fillStyle = 'rgba(11,5,18,0.78)';
    cx.fillRect(0, 0, W, PLAY_H);
    text('YOU GOT', W / 2, 104, '#ff6b81', 16);
    text('SHREDDED', W / 2, 128, '#ff6b81', 16);
    text('mov. ' + roman(level) + ', on ' + DIFF().name, W / 2, 152, DIFF().col, 8);
    text('SCORE ' + Math.floor(score), W / 2, 176, '#ffd166', 8);
    text('BEST  ' + Math.floor(best), W / 2, 192, '#4ecdc4', 8);
    text(dodged + ' notes dodged', W / 2, 212, '#b58fd6', 8);
    text(grazes + ' harmonic grazes', W / 2, 226, '#b58fd6', 8);
    text(Object.values(passives).reduce((a, b) => a + b, 0) + actives.filter(a => a).length
         + ' skills collected', W / 2, 240, '#b58fd6', 8);
    if (Math.floor(now * 2) % 2 === 0) text('Z / TAP FOR AN ENCORE', W / 2, 272, '#ffffff', 8);
    text('X FOR MENU', W / 2, 288, '#6b4a8f', 8);
  }

  cx.restore();
  drawSkillBar(now);
}

// ------------------------------------------------------------------ loop ---
let last = performance.now();
function frame(t) {
  const dt = Math.min(0.033, (t - last) / 1000);
  last = t;
  if (!paused) update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

reset();
})();
</script>
</body>
</html>
