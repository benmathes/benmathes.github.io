<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI to Build Enterprise Software | YC Startup Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--fg:#1a1a1a;--card:#fff;--card-border:#e0e0e0;--accent:#ff6600;--subtle:#888;--green:#22c55e;--blue:#3b82f6;--purple:#a855f7;--red:#ef4444}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0f;--fg:#e8e8e8;--card:#1a1a1a;--card-border:#2a2a2a;--subtle:#777}}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;z-index:1000;font-weight:500}
a.back:hover{text-decoration:underline}
.header{text-align:center;padding:40px 20px 20px}
.header h1{font-size:28px;font-weight:700}.header h1 span{color:var(--accent)}
.header p{color:var(--subtle);font-size:14px;margin-top:8px}
.prompt-area{max-width:700px;margin:0 auto;padding:0 20px 16px}
.prompt-input-wrap{display:flex;gap:10px;background:var(--card);border:2px solid var(--card-border);border-radius:14px;padding:6px 6px 6px 18px;transition:border-color .2s}
.prompt-input-wrap:focus-within{border-color:var(--accent)}
.prompt-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;color:var(--fg);outline:none}
.prompt-input::placeholder{color:var(--subtle)}
.build-btn{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:transform .15s}
.build-btn:hover{transform:scale(1.02)}
.build-btn:disabled{opacity:0.5;cursor:not-allowed}
.presets{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 20px 24px}
.preset{padding:8px 16px;background:var(--card);border:1px solid var(--card-border);border-radius:8px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;color:var(--fg);transition:all .2s}
.preset:hover{border-color:var(--accent);color:var(--accent)}
.build-log{max-width:700px;margin:0 auto;padding:0 20px 16px;font-size:12px;color:var(--subtle)}
.build-log .log-line{padding:2px 0;animation:fadeIn .3s ease}
.build-log .log-line .check{color:var(--green)}
.build-log .log-line .spinner{color:var(--accent);display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.app-container{max-width:1100px;margin:0 auto;padding:0 20px 40px}
.generated-app{background:var(--card);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;min-height:500px;opacity:0;transform:translateY(20px);transition:all .6s ease}
.generated-app.visible{opacity:1;transform:translateY(0)}
/* App chrome */
.app-chrome{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--card-border);background:var(--card-border)}
.app-chrome .dots{display:flex;gap:5px}.app-chrome .dot{width:10px;height:10px;border-radius:50%}
.app-chrome .dot.r{background:#ff5f57}.app-chrome .dot.y{background:#ffbd2e}.app-chrome .dot.g{background:#28c940}
.app-chrome .url-bar{flex:1;background:var(--card);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--subtle);margin-left:8px}
/* App layout */
.app-layout{display:flex;min-height:460px}
.app-sidebar{width:200px;border-right:1px solid var(--card-border);padding:16px;display:flex;flex-direction:column;gap:4px;opacity:0;transform:translateX(-20px);transition:all .5s}
.app-sidebar.visible{opacity:1;transform:translateX(0)}
.sidebar-item{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s}
.sidebar-item:hover{background:var(--card-border)}
.sidebar-item.active{background:var(--accent);color:#fff}
.sidebar-item .icon{margin-right:8px}
.app-main{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px}
.app-block{opacity:0;transform:translateY(15px);transition:all .4s ease}
.app-block.visible{opacity:1;transform:translateY(0)}
/* App components */
.app-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.app-kpi{background:var(--bg);border-radius:10px;padding:14px}
.app-kpi .kpi-label{font-size:11px;color:var(--subtle);font-weight:500}
.app-kpi .kpi-value{font-size:22px;font-weight:700;margin-top:2px}
.app-kpi .kpi-change{font-size:11px;color:var(--green);font-weight:600}
.app-toolbar{display:flex;gap:8px;align-items:center}
.app-search{flex:1;padding:8px 14px;background:var(--bg);border:1px solid var(--card-border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--fg)}
.app-btn{padding:8px 16px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none}
.app-btn.primary{background:var(--accent);color:#fff}
.app-btn.secondary{background:var(--card-border);color:var(--fg)}
.app-table{width:100%;border-collapse:collapse;font-size:12px}
.app-table th{text-align:left;padding:10px 12px;border-bottom:2px solid var(--card-border);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:var(--subtle)}
.app-table td{padding:10px 12px;border-bottom:1px solid var(--card-border)}
.app-table tr:hover td{background:var(--bg)}
.status-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:700}
.status-badge.active{background:#22c55e20;color:var(--green)}
.status-badge.pending{background:#ff660020;color:var(--accent)}
.status-badge.inactive{background:var(--card-border);color:var(--subtle)}
.app-chart{background:var(--bg);border-radius:10px;padding:16px;min-height:120px}
.app-chart h4{font-size:12px;font-weight:600;margin-bottom:8px}
.mini-bars{display:flex;align-items:flex-end;gap:4px;height:80px}
.mini-bars .bar{flex:1;background:var(--accent);border-radius:3px 3px 0 0;transition:height .5s}
.app-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;background:var(--bg);border-radius:10px;padding:16px}
.form-field label{font-size:11px;font-weight:600;color:var(--subtle);display:block;margin-bottom:4px}
.form-field input,.form-field select{width:100%;padding:8px 12px;border:1px solid var(--card-border);border-radius:6px;font-family:inherit;font-size:12px;background:var(--card);color:var(--fg)}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Back to all demos</a>
<div class="header">
<h1><span>AI</span> Enterprise Software Builder</h1>
<p>Describe what you need, and watch an enterprise app assemble itself</p>
</div>
<div class="prompt-area">
<div class="prompt-input-wrap">
<input class="prompt-input" id="promptInput" placeholder="Describe your enterprise app..." value="">
<button class="build-btn" id="buildBtn">Build App</button>
</div>
</div>
<div class="presets">
<button class="preset" data-prompt="A CRM for tracking sales leads and deals">&#128188; CRM for Sales Leads</button>
<button class="preset" data-prompt="An inventory management system for a warehouse">&#128230; Inventory Management</button>
<button class="preset" data-prompt="A project management tool with tasks and timelines">&#128203; Project Management</button>
<button class="preset" data-prompt="An HR platform for managing employees and time off">&#128101; HR Platform</button>
</div>
<div class="build-log" id="buildLog"></div>
<div class="app-container">
<div class="generated-app" id="generatedApp"></div>
</div>
<script>
const apps={
"A CRM for tracking sales leads and deals":{
url:'app.crm-pro.io/dashboard',
sidebar:[{icon:'&#9776;',label:'Dashboard',active:true},{icon:'&#128101;',label:'Leads'},{icon:'&#128176;',label:'Deals'},{icon:'&#128188;',label:'Companies'},{icon:'&#128200;',label:'Reports'},{icon:'&#9881;',label:'Settings'}],
kpis:[{label:'Total Leads',value:'847',change:'+23%'},{label:'Active Deals',value:'$2.4M',change:'+12%'},{label:'Won This Month',value:'34',change:'+8%'},{label:'Conv. Rate',value:'28%',change:'+3%'}],
toolbar:{search:'Search leads, deals, companies...',buttons:['+ New Lead','Import']},
table:{headers:['Name','Company','Stage','Value','Owner','Last Contact'],rows:[
['Sarah Chen','Acme Corp','<span class="status-badge active">Qualified</span>','$45,000','Alex M.','2h ago'],
['Mike Patel','Globex Inc','<span class="status-badge pending">Proposal</span>','$120,000','Jordan K.','1d ago'],
['Lisa Wang','Initech','<span class="status-badge active">Negotiation</span>','$78,000','Alex M.','4h ago'],
['James Lee','Umbrella Co','<span class="status-badge inactive">Cold</span>','$25,000','Sam R.','5d ago'],
['Ana Garcia','Soylent Corp','<span class="status-badge pending">Demo</span>','$92,000','Jordan K.','12h ago']]},
chart:{title:'Deals by Stage',bars:[30,65,45,80,55,40,70,50,60,45,75,55]},
form:null},

"An inventory management system for a warehouse":{
url:'app.warehouse-hub.io/inventory',
sidebar:[{icon:'&#128200;',label:'Dashboard',active:true},{icon:'&#128230;',label:'Inventory'},{icon:'&#128666;',label:'Shipments'},{icon:'&#128179;',label:'Purchase Orders'},{icon:'&#128269;',label:'Audit Log'},{icon:'&#9881;',label:'Settings'}],
kpis:[{label:'Total SKUs',value:'12,847',change:'+142'},{label:'Low Stock',value:'23',change:'-5'},{label:'Inbound',value:'847 units',change:'Today'},{label:'Value',value:'$1.2M',change:'+4%'}],
toolbar:{search:'Search products, SKUs, locations...',buttons:['+ Add Product','Restock']},
table:{headers:['SKU','Product','Location','Qty','Min','Status','Last Updated'],rows:[
['WH-001','Wireless Headphones','A-12-3','342','50','<span class="status-badge active">In Stock</span>','1h ago'],
['WH-002','USB-C Cable 6ft','B-04-1','12','100','<span class="status-badge pending">Low Stock</span>','3h ago'],
['WH-003','Laptop Stand Pro','C-08-2','567','75','<span class="status-badge active">In Stock</span>','2h ago'],
['WH-004','Webcam HD 1080p','A-03-5','0','200','<span class="status-badge inactive">Out of Stock</span>','1d ago'],
['WH-005','Mech Keyboard','D-01-1','89','50','<span class="status-badge active">In Stock</span>','5h ago']]},
chart:{title:'Inventory Levels (30 days)',bars:[80,75,82,78,70,65,60,72,68,74,80,85]},
form:null},

"A project management tool with tasks and timelines":{
url:'app.taskflow.io/projects',
sidebar:[{icon:'&#127968;',label:'Home',active:true},{icon:'&#128203;',label:'Projects'},{icon:'&#9745;',label:'My Tasks'},{icon:'&#128197;',label:'Timeline'},{icon:'&#128101;',label:'Team'},{icon:'&#9881;',label:'Settings'}],
kpis:[{label:'Active Projects',value:'12',change:'3 due soon'},{label:'Open Tasks',value:'147',change:'-12 today'},{label:'Completed',value:'89%',change:'+2%'},{label:'Team Load',value:'78%',change:'Balanced'}],
toolbar:{search:'Search projects, tasks, team members...',buttons:['+ New Task','+ New Project']},
table:{headers:['Task','Project','Assignee','Priority','Due','Status'],rows:[
['Redesign landing page','Website v3','Alex M.','<span style="color:var(--red)">&#9679; High</span>','Mar 28','<span class="status-badge pending">In Progress</span>'],
['API rate limiting','Backend','Jordan K.','<span style="color:var(--accent)">&#9679; Medium</span>','Mar 30','<span class="status-badge active">Review</span>'],
['User onboarding flow','Mobile App','Sam R.','<span style="color:var(--red)">&#9679; High</span>','Apr 2','<span class="status-badge pending">In Progress</span>'],
['Database migration','Infrastructure','Lisa W.','<span style="color:var(--green)">&#9679; Low</span>','Apr 5','<span class="status-badge inactive">Backlog</span>'],
['Analytics dashboard','Reporting','Mike P.','<span style="color:var(--accent)">&#9679; Medium</span>','Apr 1','<span class="status-badge pending">In Progress</span>']]},
chart:{title:'Tasks Completed per Week',bars:[12,18,15,22,19,24,20,26,23,28,25,30]},
form:null},

"An HR platform for managing employees and time off":{
url:'app.people-ops.io/team',
sidebar:[{icon:'&#128200;',label:'Dashboard',active:true},{icon:'&#128101;',label:'Employees'},{icon:'&#127958;',label:'Time Off'},{icon:'&#128176;',label:'Payroll'},{icon:'&#128218;',label:'Handbook'},{icon:'&#9881;',label:'Settings'}],
kpis:[{label:'Headcount',value:'156',change:'+4 this month'},{label:'Open Roles',value:'12',change:'3 urgent'},{label:'PTO Today',value:'8',change:'2 pending'},{label:'Satisfaction',value:'4.2/5',change:'+0.1'}],
toolbar:{search:'Search employees, departments...',buttons:['+ Add Employee','Run Payroll']},
table:{headers:['Name','Department','Role','Start Date','Status','Manager'],rows:[
['Sarah Chen','Engineering','Sr. Engineer','Jan 2023','<span class="status-badge active">Active</span>','Alex M.'],
['Mike Patel','Sales','Account Exec','Mar 2024','<span class="status-badge active">Active</span>','Jordan K.'],
['Lisa Wang','Design','Lead Designer','Jun 2022','<span class="status-badge pending">On Leave</span>','Sam R.'],
['James Lee','Engineering','Engineer','Sep 2024','<span class="status-badge active">Active</span>','Sarah C.'],
['Ana Garcia','Marketing','Content Lead','Nov 2023','<span class="status-badge active">Active</span>','Jordan K.']]},
chart:{title:'Headcount Growth',bars:[120,122,126,130,132,138,140,142,148,150,153,156]},
form:null}
};

const buildBtn=document.getElementById('buildBtn');
const promptInput=document.getElementById('promptInput');
const buildLog=document.getElementById('buildLog');

document.querySelectorAll('.preset').forEach(btn=>{
btn.addEventListener('click',()=>{
promptInput.value=btn.dataset.prompt;
startBuild();
});
});
buildBtn.addEventListener('click',startBuild);
promptInput.addEventListener('keydown',e=>{if(e.key==='Enter')startBuild()});

async function startBuild(){
const prompt=promptInput.value.trim();if(!prompt)return;
buildBtn.disabled=true;
buildLog.innerHTML='';
document.getElementById('generatedApp').classList.remove('visible');
document.getElementById('generatedApp').innerHTML='';

// Find matching app or default to CRM
let appKey=Object.keys(apps).find(k=>prompt.toLowerCase().includes(k.split(' ').slice(1,3).join(' ').toLowerCase()));
if(!appKey)appKey=Object.keys(apps)[0];
const app=apps[appKey];

const steps=[
'Analyzing requirements...',
'Designing data schema...',
'Generating UI components...',
'Building navigation...',
'Creating dashboard widgets...',
'Populating sample data...',
'Applying styles and theming...',
'Running final checks...'
];

for(let i=0;i<steps.length;i++){
addLog('<span class="spinner">&#9696;</span> '+steps[i]);
await wait(400+Math.random()*300);
buildLog.lastChild.innerHTML='<span class="check">&#10003;</span> '+steps[i].replace('...','');
}
addLog('<span class="check">&#10003;</span> <b>App ready!</b>');

await wait(300);
renderApp(app);
buildBtn.disabled=false;
}

function addLog(html){
const div=document.createElement('div');div.className='log-line';div.innerHTML=html;
buildLog.appendChild(div);buildLog.scrollTop=buildLog.scrollHeight;
}

async function renderApp(app){
const container=document.getElementById('generatedApp');
// Chrome
let html=`<div class="app-chrome"><div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div><div class="url-bar">${app.url}</div></div>`;
html+=`<div class="app-layout"><div class="app-sidebar" id="appSidebar">`;
app.sidebar.forEach(item=>{
html+=`<div class="sidebar-item${item.active?' active':''}">${item.icon?'<span class="icon">'+item.icon+'</span>':''}${item.label}</div>`;
});
html+=`</div><div class="app-main">`;
html+=`<div class="app-block app-kpis" id="block0">${app.kpis.map(k=>`<div class="app-kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.value}</div><div class="kpi-change">${k.change}</div></div>`).join('')}</div>`;
html+=`<div class="app-block app-toolbar" id="block1"><input class="app-search" placeholder="${app.toolbar.search}">${app.toolbar.buttons.map((b,i)=>`<button class="app-btn ${i===0?'primary':'secondary'}">${b}</button>`).join('')}</div>`;
html+=`<div class="app-block" id="block2" style="overflow-x:auto"><table class="app-table"><thead><tr>${app.table.headers.map(h=>'<th>'+h+'</th>').join('')}</tr></thead><tbody>${app.table.rows.map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('')}</tbody></table></div>`;
html+=`<div class="app-block app-chart" id="block3"><h4>${app.chart.title}</h4><div class="mini-bars">${app.chart.bars.map(b=>`<div class="bar" style="height:${b}%"></div>`).join('')}</div></div>`;
html+=`</div></div>`;
container.innerHTML=html;

await wait(100);
container.classList.add('visible');
await wait(200);
document.getElementById('appSidebar').classList.add('visible');
for(let i=0;i<4;i++){
await wait(200);
document.getElementById('block'+i).classList.add('visible');
}
}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
</script>
</body>
</html>
