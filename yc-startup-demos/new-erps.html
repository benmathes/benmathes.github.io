<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New ERPs | YC Startup Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f5f5;--fg:#1a1a1a;--card:#fff;--card-border:#e0e0e0;--accent:#ff6600;--accent-light:#ff660020;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--subtle:#888}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f0f;--fg:#e8e8e8;--card:#1a1a1a;--card-border:#2a2a2a;--subtle:#777}}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
a.back{position:fixed;top:16px;left:16px;color:var(--accent);text-decoration:none;font-size:14px;z-index:1000;font-weight:500}
a.back:hover{text-decoration:underline}
.header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--card-border)}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--accent)}
.header .time{font-size:13px;color:var(--subtle)}
.dashboard{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;grid-template-rows:auto 1fr auto;gap:16px;padding:16px 24px;height:calc(100vh - 73px)}
.kpi-row{display:contents}
.kpi{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px}
.kpi .label{font-size:12px;color:var(--subtle);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.kpi .value{font-size:28px;font-weight:700;margin:4px 0}
.kpi .change{font-size:12px;font-weight:600}
.kpi .change.up{color:var(--green)}.kpi .change.down{color:var(--red)}
.inventory-section{grid-column:1/3;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;overflow:hidden}
.inventory-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{width:90px;font-size:12px;font-weight:500;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--card-border);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width 1s ease;position:relative}
.bar-fill span{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#fff}
.bar-fill.low{background:var(--red)}.bar-fill.mid{background:var(--accent)}.bar-fill.high{background:var(--green)}
.kanban-section{grid-column:1/4;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;overflow:hidden;display:flex;flex-direction:column}
.kanban-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.kanban{display:flex;gap:12px;flex:1;overflow-x:auto}
.kanban-col{flex:1;min-width:160px;background:var(--bg);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px}
.kanban-col-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.kanban-col-title .count{background:var(--card-border);border-radius:10px;padding:1px 7px;font-size:11px}
.kanban-card{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px;font-size:12px;cursor:grab;transition:transform .15s,box-shadow .15s}
.kanban-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.kanban-card .order-id{font-weight:600;color:var(--accent)}
.kanban-card .order-details{color:var(--subtle);margin-top:4px;font-size:11px}
.ai-section{grid-column:4/5;grid-row:2/4;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;overflow:hidden}
.ai-section h3{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ai-section h3 .badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.ai-insights{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.insight{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;line-height:1.5;border-left:3px solid var(--accent);animation:slideIn .4s ease}
.insight .type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.insight .type.warning{color:var(--red)}.insight .type.info{color:var(--blue)}.insight .type.success{color:var(--green)}
.insight .time{font-size:10px;color:var(--subtle);margin-top:6px}
.revenue-section{grid-column:3/4;grid-row:2/3;background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.revenue-section h3{font-size:14px;font-weight:600;margin-bottom:8px}
.revenue-ticker{font-size:36px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.revenue-sub{font-size:12px;color:var(--subtle);margin-top:4px}
.revenue-chart{width:100%;height:60px;margin-top:12px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<a class="back" href="index.html">&larr; Back to all demos</a>
<div class="header">
<h1><span>ERP</span> Dashboard</h1>
<div class="time" id="clock"></div>
</div>
<div class="dashboard">
<div class="kpi"><div class="label">Total Orders</div><div class="value" id="kpi1">2,847</div><div class="change up">&#9650; 12.3% vs last month</div></div>
<div class="kpi"><div class="label">Fulfillment Rate</div><div class="value">96.8%</div><div class="change up">&#9650; 1.2%</div></div>
<div class="kpi"><div class="label">Avg. Processing</div><div class="value">1.4d</div><div class="change up">&#9650; 18% faster</div></div>
<div class="kpi"><div class="label">Returns</div><div class="value">2.1%</div><div class="change down">&#9660; 0.3%</div></div>

<div class="inventory-section">
<h3>Inventory Levels</h3>
<div id="inventoryBars"></div>
</div>

<div class="revenue-section">
<h3>Real-Time Revenue</h3>
<div class="revenue-ticker" id="revTicker">$0</div>
<div class="revenue-sub">Today's revenue</div>
<canvas class="revenue-chart" id="revChart"></canvas>
</div>

<div class="kanban-section">
<h3>Order Pipeline</h3>
<div class="kanban" id="kanban"></div>
</div>

<div class="ai-section">
<h3>AI Insights <span class="badge">LIVE</span></h3>
<div class="ai-insights" id="aiInsights"></div>
</div>
</div>

<script>
// Clock
function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleString('en-US',{weekday:'short',hour:'numeric',minute:'2-digit',second:'2-digit'})}
setInterval(updateClock,1000);updateClock();

// Inventory
const inventory=[
{name:'Widget X',level:23,max:100},{name:'Widget Y',level:67,max:100},{name:'Gizmo A',level:89,max:100},
{name:'Gizmo B',level:45,max:100},{name:'Part C-12',level:12,max:100},{name:'Module Z',level:78,max:100},
{name:'Sensor K',level:55,max:100},{name:'Board R2',level:34,max:100}
];
function renderInventory(){
const c=document.getElementById('inventoryBars');c.innerHTML='';
inventory.forEach(item=>{
const pct=item.level;
const cls=pct<30?'low':pct<60?'mid':'high';
c.innerHTML+=`<div class="bar-row"><div class="bar-label">${item.name}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"><span>${pct}%</span></div></div></div>`;
});
}
renderInventory();
setInterval(()=>{
inventory.forEach(item=>{item.level=Math.max(5,Math.min(98,item.level+Math.floor(Math.random()*11)-5))});
renderInventory();
},3000);

// Kanban
const orderNames=['Acme Corp','Globex','Initech','Umbrella','Soylent','Wonka','Stark Ind','Wayne Ent','Oscorp','Cyberdyne'];
const kanbanCols=[
{title:'New',color:'var(--blue)',cards:[]},
{title:'Processing',color:'var(--accent)',cards:[]},
{title:'Shipped',color:'var(--purple)',cards:[]},
{title:'Delivered',color:'var(--green)',cards:[]}
];
let orderCounter=1000;
function makeOrder(){
return{id:'ORD-'+(orderCounter++),customer:orderNames[Math.floor(Math.random()*orderNames.length)],amount:'$'+(Math.random()*5000+100).toFixed(0),items:Math.floor(Math.random()*8)+1+' items'};
}
for(let i=0;i<3;i++)kanbanCols[0].cards.push(makeOrder());
for(let i=0;i<2;i++)kanbanCols[1].cards.push(makeOrder());
for(let i=0;i<2;i++)kanbanCols[2].cards.push(makeOrder());
for(let i=0;i<4;i++)kanbanCols[3].cards.push(makeOrder());

function renderKanban(){
const k=document.getElementById('kanban');k.innerHTML='';
kanbanCols.forEach(col=>{
const d=document.createElement('div');d.className='kanban-col';
d.innerHTML=`<div class="kanban-col-title">${col.title} <span class="count">${col.cards.length}</span></div>`;
col.cards.forEach(card=>{
d.innerHTML+=`<div class="kanban-card"><div class="order-id">${card.id}</div><div>${card.customer}</div><div class="order-details">${card.amount} &middot; ${card.items}</div></div>`;
});
k.appendChild(d);
});
}
renderKanban();
setInterval(()=>{
// Move cards forward
for(let i=kanbanCols.length-1;i>0;i--){
if(kanbanCols[i-1].cards.length>0&&Math.random()>0.5){
kanbanCols[i].cards.unshift(kanbanCols[i-1].cards.pop());
}
}
if(kanbanCols[3].cards.length>6)kanbanCols[3].cards.pop();
if(kanbanCols[0].cards.length<4&&Math.random()>0.3)kanbanCols[0].cards.unshift(makeOrder());
renderKanban();
},2500);

// Revenue ticker
let revenue=34520;
const revHistory=[];
for(let i=0;i<50;i++)revHistory.push(Math.random()*500+100);
function updateRevenue(){
const add=Math.random()*300+20;revenue+=add;revHistory.push(add);
if(revHistory.length>50)revHistory.shift();
document.getElementById('revTicker').textContent='$'+Math.floor(revenue).toLocaleString();
drawRevChart();
}
setInterval(updateRevenue,1500);

function drawRevChart(){
const canvas=document.getElementById('revChart');
const ctx=canvas.getContext('2d');
const w=canvas.width=canvas.offsetWidth*2;
const h=canvas.height=canvas.offsetHeight*2;
ctx.clearRect(0,0,w,h);
const max=Math.max(...revHistory)*1.1;
ctx.beginPath();
ctx.strokeStyle='#ff6600';ctx.lineWidth=2;
revHistory.forEach((v,i)=>{
const x=(i/(revHistory.length-1))*w;
const y=h-((v/max)*h);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});
ctx.stroke();
ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
ctx.fillStyle='rgba(255,102,0,0.1)';ctx.fill();
}

// AI Insights
const insightTemplates=[
{type:'warning',cls:'warning',texts:[
'Inventory of <b>Widget X</b> dropping faster than forecast. Reorder recommended within 48 hours.',
'Order processing time for <b>Acme Corp</b> exceeding SLA by 6 hours.',
'Unusual return rate spike on <b>Gizmo B</b> &mdash; quality check recommended.',
'Supplier <b>FastParts Inc</b> delayed 3 shipments this week. Consider backup vendor.'
]},
{type:'insight',cls:'info',texts:[
'Demand for <b>Module Z</b> correlates with seasonal trend. Pre-ordering suggested.',
'Top customer <b>Globex</b> order frequency up 40%. Upgrade to premium tier?',
'Shipping route optimization could save <b>$2,400/mo</b> on east coast deliveries.',
'<b>3 invoices</b> pending approval for over 72 hours.'
]},
{type:'positive',cls:'success',texts:[
'Fulfillment rate improved to <b>96.8%</b> &mdash; best quarter this year.',
'<b>Sensor K</b> restocked successfully. Inventory buffer at healthy levels.',
'All high-priority orders shipped within SLA this week.',
]}
];
function addInsight(){
const cat=insightTemplates[Math.floor(Math.random()*insightTemplates.length)];
const text=cat.texts[Math.floor(Math.random()*cat.texts.length)];
const el=document.getElementById('aiInsights');
const div=document.createElement('div');div.className='insight';
div.innerHTML=`<div class="type ${cat.cls}">${cat.type}</div>${text}<div class="time">Just now</div>`;
el.prepend(div);
if(el.children.length>8)el.removeChild(el.lastChild);
}
addInsight();addInsight();addInsight();
setInterval(addInsight,5000);

updateRevenue();
</script>
</body>
</html>
