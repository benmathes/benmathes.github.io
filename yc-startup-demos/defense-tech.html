<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Defense Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f8f8f8;--surface:#fff;--text:#1a1a1a;--text-secondary:#666;
  --border:#e0e0e0;--accent:#ff6600;--accent-light:rgba(255,102,0,0.15);
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0a0a0f;--surface:#12121a;--text:#e0e0e0;--text-secondary:#888;
  --border:#252530;--accent-light:rgba(255,102,0,0.15);--shadow:0 2px 12px rgba(0,0,0,0.4);
}}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.back-link{display:inline-block;padding:16px 24px;color:var(--accent);text-decoration:none;font-weight:500;font-size:14px;}
.back-link:hover{opacity:0.7;}
.container{max-width:1200px;margin:0 auto;padding:0 24px 48px;}
h1{font-size:32px;font-weight:700;margin-bottom:8px;}
.subtitle{color:var(--text-secondary);font-size:16px;margin-bottom:24px;}
.dashboard{display:grid;grid-template-columns:1fr 340px;gap:20px;}
@media(max-width:900px){.dashboard{grid-template-columns:1fr;}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
canvas{width:100%;border-radius:8px;display:block;}
.sidebar{display:flex;flex-direction:column;gap:16px;}
h3{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.threat-level{display:flex;align-items:center;gap:12px;padding:12px;border-radius:8px;background:var(--bg);}
.threat-level .indicator{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:white;}
.threat-level .info .label{font-size:12px;color:var(--text-secondary);}
.threat-level .info .value{font-size:20px;font-weight:700;}
.threat-list{max-height:260px;overflow-y:auto;}
.threat-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:13px;background:var(--bg);animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:none;}}
.threat-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.threat-item .type{flex:1;font-weight:500;}
.threat-item .class{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;}
.friend{background:rgba(0,200,100,0.15);color:#00c864;}
.foe{background:rgba(255,50,50,0.15);color:#ff3232;}
.unknown{background:rgba(255,200,0,0.15);color:#cca000;}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metric{text-align:center;padding:10px;background:var(--bg);border-radius:8px;}
.metric .val{font-size:22px;font-weight:700;color:var(--accent);}
.metric .lbl{font-size:11px;color:var(--text-secondary);margin-top:2px;}
.status-bar{display:flex;gap:8px;flex-wrap:wrap;}
.status-chip{font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px;background:var(--accent-light);color:var(--accent);}
</style>
</head>
<body>
<a href="index.html" class="back-link">&#8592; Back to all demos</a>
<div class="container">
  <h1>New Defense Technology</h1>
  <p class="subtitle">AI-powered threat detection and classification dashboard</p>
  <div class="status-bar" style="margin-bottom:16px;">
    <span class="status-chip">SYSTEM ACTIVE</span>
    <span class="status-chip" id="timeChip">00:00:00</span>
    <span class="status-chip" id="scanChip">SCANNING</span>
  </div>
  <div class="dashboard">
    <div class="card" style="padding:0;overflow:hidden;">
      <canvas id="radarCanvas" width="800" height="560"></canvas>
    </div>
    <div class="sidebar">
      <div class="card">
        <h3>Threat Level</h3>
        <div class="threat-level">
          <div class="indicator" id="threatIndicator" style="background:#44bb66;">2</div>
          <div class="info">
            <div class="label">Current Assessment</div>
            <div class="value" id="threatLabel">ELEVATED</div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3>Metrics</h3>
        <div class="metric-grid">
          <div class="metric"><div class="val" id="mTracked">0</div><div class="lbl">Tracked</div></div>
          <div class="metric"><div class="val" id="mClassified">0</div><div class="lbl">Classified</div></div>
          <div class="metric"><div class="val" id="mResponseTime">0ms</div><div class="lbl">Avg Response</div></div>
          <div class="metric"><div class="val" id="mAccuracy">98.2%</div><div class="lbl">AI Accuracy</div></div>
        </div>
      </div>
      <div class="card">
        <h3>Recent Detections</h3>
        <div class="threat-list" id="threatList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('radarCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;
canvas.width = W; canvas.height = H;

const cx = W*0.45, cy = H*0.5, maxR = 240;
let sweepAngle = 0;
let entities = [];
let threats = [];
let totalTracked = 0, totalClassified = 0;
const threatTypes = ['Aircraft','Drone','Vessel','Missile','Satellite','Vehicle','Submarine','Helicopter'];
const classTypes = ['friend','foe','unknown'];

function addEntity() {
  const angle = Math.random()*Math.PI*2;
  const r = 30 + Math.random()*(maxR-40);
  const cls = classTypes[Math.floor(Math.random()*3)];
  const type = threatTypes[Math.floor(Math.random()*threatTypes.length)];
  const e = {
    x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r,
    vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5,
    cls, type, born: Date.now(), classified: false, classifyTime: 800+Math.random()*2000,
    pulse:0, id: 'T-'+String(totalTracked+1).padStart(3,'0')
  };
  entities.push(e);
  totalTracked++;
  if (entities.length > 24) entities.shift();
}

function classifyEntity(e) {
  e.classified = true;
  totalClassified++;
  threats.unshift({type:e.type, cls:e.cls, id:e.id, time:new Date().toLocaleTimeString()});
  if (threats.length > 12) threats.pop();
  renderThreats();
}

function renderThreats() {
  const list = document.getElementById('threatList');
  list.innerHTML = threats.map(t => `
    <div class="threat-item">
      <div class="dot" style="background:${t.cls==='friend'?'#00c864':t.cls==='foe'?'#ff3232':'#ccaa00'}"></div>
      <span class="type">${t.id} ${t.type}</span>
      <span class="class ${t.cls}">${t.cls.toUpperCase()}</span>
    </div>
  `).join('');
}

function updateMetrics() {
  const foeCount = entities.filter(e=>e.cls==='foe'&&e.classified).length;
  const level = foeCount >= 3 ? 4 : foeCount >= 2 ? 3 : foeCount >= 1 ? 2 : 1;
  const labels = ['','LOW','ELEVATED','HIGH','CRITICAL'];
  const colors = ['','#44bb66','#ffaa00','#ff6600','#ff3232'];
  document.getElementById('threatIndicator').style.background = colors[level];
  document.getElementById('threatIndicator').textContent = level;
  document.getElementById('threatLabel').textContent = labels[level];
  document.getElementById('mTracked').textContent = totalTracked;
  document.getElementById('mClassified').textContent = totalClassified;
  document.getElementById('mResponseTime').textContent = (800+Math.random()*400).toFixed(0)+'ms';

  const now = new Date();
  document.getElementById('timeChip').textContent = now.toLocaleTimeString();
}

function draw() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0,0,W,H);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,100,0.06)';
  ctx.lineWidth = 1;
  for (let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for (let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Radar circles
  ctx.strokeStyle = 'rgba(0,255,100,0.12)';
  for (let r=60;r<=maxR;r+=60){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  }
  // Cross
  ctx.beginPath();ctx.moveTo(cx-maxR,cy);ctx.lineTo(cx+maxR,cy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx,cy-maxR);ctx.lineTo(cx,cy+maxR);ctx.stroke();

  // Sweep
  sweepAngle += 0.02;
  const sweepGrad = ctx.createConicalGradient ? null : null;
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.arc(cx,cy,maxR,sweepAngle-0.5,sweepAngle);
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  grad.addColorStop(0,'rgba(0,255,100,0.15)');
  grad.addColorStop(1,'rgba(0,255,100,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Sweep line
  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(sweepAngle)*maxR, cy+Math.sin(sweepAngle)*maxR);
  ctx.strokeStyle = 'rgba(0,255,100,0.5)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Entities
  const now = Date.now();
  for (let e of entities) {
    e.x += e.vx; e.y += e.vy;
    e.pulse = (e.pulse + 0.05) % (Math.PI*2);

    if (!e.classified && now - e.born > e.classifyTime) {
      classifyEntity(e);
    }

    const color = e.cls==='friend'?'#00c864':e.cls==='foe'?'#ff3232':'#ccaa00';
    const alpha = e.classified ? 1 : 0.4 + Math.sin(now/200)*0.3;

    // Glow
    ctx.beginPath();
    ctx.arc(e.x,e.y,12+Math.sin(e.pulse)*4,0,Math.PI*2);
    ctx.fillStyle = color.replace(')',`,0.15)`).replace('#','rgba(');
    const r2 = parseInt(color.slice(1,3),16), g2 = parseInt(color.slice(3,5),16), b2 = parseInt(color.slice(5,7),16);
    ctx.fillStyle = `rgba(${r2},${g2},${b2},0.15)`;
    ctx.fill();

    // Dot
    ctx.beginPath();
    ctx.arc(e.x,e.y,4,0,Math.PI*2);
    ctx.fillStyle = `rgba(${r2},${g2},${b2},${alpha})`;
    ctx.fill();

    // Label
    if (e.classified) {
      ctx.font = '500 10px Space Grotesk';
      ctx.fillStyle = `rgba(${r2},${g2},${b2},0.8)`;
      ctx.fillText(e.id, e.x+8, e.y-6);
      ctx.fillText(e.type, e.x+8, e.y+6);

      // Bracket
      ctx.strokeStyle = `rgba(${r2},${g2},${b2},0.4)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(e.x-8, e.y-8, 16, 16);
    } else {
      ctx.font = '500 9px Space Grotesk';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('CLASSIFYING...', e.x+8, e.y+3);
    }
  }

  // Center dot
  ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);
  ctx.fillStyle='#00ff64';ctx.fill();

  // Labels
  ctx.font='600 12px Space Grotesk';
  ctx.fillStyle='rgba(0,255,100,0.5)';
  ctx.fillText('N',cx-4,cy-maxR-8);
  ctx.fillText('S',cx-4,cy+maxR+16);
  ctx.fillText('E',cx+maxR+8,cy+4);
  ctx.fillText('W',cx-maxR-18,cy+4);

  // Range labels
  ctx.font='400 10px Space Grotesk';
  ctx.fillStyle='rgba(0,255,100,0.3)';
  for (let r=60;r<=maxR;r+=60) ctx.fillText((r/60*50)+'km',cx+r+4,cy-4);

  updateMetrics();
  requestAnimationFrame(draw);
}

// Spawn entities periodically
setInterval(addEntity, 2500);
addEntity(); addEntity(); addEntity(); addEntity(); addEntity();

draw();
</script>
</body>
</html>
