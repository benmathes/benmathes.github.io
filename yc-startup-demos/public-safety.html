<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Safety Technologies</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f8f8;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e0e0e0;
  --accent: #ff6600;
  --accent-light: rgba(255, 102, 0, 0.15);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --text: #e8e8e8;
    --text-secondary: #999;
    --border: #333;
    --accent-light: rgba(255, 102, 0, 0.2);
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}
.back-link {
  display: inline-block;
  padding: 12px 24px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
}
.back-link:hover { opacity: 0.7; }
.top-bar {
  padding: 0 24px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.top-bar h1 { font-size: 22px; }
.stats {
  display: flex;
  gap: 20px;
  font-size: 13px;
}
.stat-val { font-weight: 700; color: var(--accent); }
.main-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  height: calc(100vh - 100px);
  gap: 0;
}
@media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
.map-area { position: relative; background: var(--surface); border-right: 1px solid var(--border); }
#map-canvas { width: 100%; height: 100%; display: block; }
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--surface);
  overflow: hidden;
}
.sidebar-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.units-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.unit-card {
  text-align: center;
  padding: 8px 4px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 11px;
}
.unit-icon { font-size: 20px; }
.unit-count { font-weight: 700; font-size: 14px; margin: 2px 0; }
.feed {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 16px;
}
.feed-item {
  padding: 8px 10px;
  margin-bottom: 6px;
  border-radius: 8px;
  background: var(--bg);
  border-left: 3px solid var(--border);
  font-size: 12px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.feed-item.fire { border-left-color: #f44336; }
.feed-item.medical { border-left-color: #2196f3; }
.feed-item.accident { border-left-color: #ff9800; }
.feed-item.crime { border-left-color: #9c27b0; }
.feed-time { color: var(--text-secondary); font-size: 10px; }
.feed-severity { float: right; font-weight: 700; font-size: 10px; padding: 1px 6px; border-radius: 4px; }
.sev-high { background: rgba(244,67,54,0.2); color: #f44336; }
.sev-medium { background: rgba(255,152,0,0.2); color: #ff9800; }
.sev-low { background: rgba(76,175,80,0.2); color: #4caf50; }
.btn {
  display: block;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  background: var(--accent);
  color: white;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.4; cursor: default; }
.mode-toggle {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}
.mode-btn {
  flex: 1;
  padding: 6px;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text);
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.overlay-stats {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  box-shadow: var(--shadow);
  font-size: 12px;
  z-index: 5;
}
.overlay-stats .stat-row { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to all demos</a>
<div class="top-bar">
  <h1>Public Safety Technologies</h1>
  <div class="stats">
    <div>Active incidents: <span class="stat-val" id="active-count">0</span></div>
    <div>Resolved: <span class="stat-val" id="resolved-count">0</span></div>
  </div>
</div>
<div class="main-layout">
  <div class="map-area">
    <canvas id="map-canvas"></canvas>
    <div class="overlay-stats">
      <div class="stat-row"><span>Avg Response (Random)</span><strong id="avg-random" style="color:var(--text-secondary)">--</strong></div>
      <div class="stat-row"><span>Avg Response (AI)</span><strong id="avg-ai" style="color:var(--accent)">--</strong></div>
      <div class="stat-row"><span>Time Saved</span><strong id="time-saved" style="color:#4caf50">--</strong></div>
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Available Units</h3>
      <div class="units-grid">
        <div class="unit-card"><div class="unit-icon">🚔</div><div class="unit-count" id="police-count">4</div>Police</div>
        <div class="unit-card"><div class="unit-icon">🚒</div><div class="unit-count" id="fire-count">3</div>Fire</div>
        <div class="unit-card"><div class="unit-icon">🚑</div><div class="unit-count" id="amb-count">3</div>Ambulance</div>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn" id="mode-random">Random</button>
        <button class="mode-btn active" id="mode-ai">AI Dispatch</button>
      </div>
      <button class="btn" style="margin-top:10px" id="btn-dispatch">Dispatch All</button>
    </div>
    <div class="sidebar-section" style="padding-bottom:8px;">
      <h3>Live Incident Feed</h3>
    </div>
    <div class="feed" id="feed"></div>
  </div>
</div>
<script>
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
let W, H, dpr;

function resize() {
  const r = canvas.parentElement.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = r.width; H = r.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', () => { resize(); draw(); });

const GRID = 40;
const incidentTypes = [
  { type: 'fire', color: '#f44336', icon: '🔥', unit: 'fire' },
  { type: 'medical', color: '#2196f3', icon: '🏥', unit: 'ambulance' },
  { type: 'accident', color: '#ff9800', icon: '💥', unit: 'police' },
  { type: 'crime', color: '#9c27b0', icon: '🚨', unit: 'police' },
];
const severities = ['low', 'medium', 'high'];

let incidents = [];
let units = [];
let dispatched = [];
let resolved = 0;
let aiMode = true;
let responseTimes = { random: [], ai: [] };

function initUnits() {
  units = [];
  const types = [
    { type: 'police', icon: '🚔', count: 4 },
    { type: 'fire', icon: '🚒', count: 3 },
    { type: 'ambulance', icon: '🚑', count: 3 },
  ];
  types.forEach(t => {
    for (let i = 0; i < t.count; i++) {
      units.push({
        type: t.type,
        icon: t.icon,
        x: 20 + Math.random() * (W - 40),
        y: 20 + Math.random() * (H - 40),
        busy: false,
        targetX: null, targetY: null,
        progress: 0,
        startX: 0, startY: 0,
      });
    }
  });
}

function spawnIncident() {
  const tpl = incidentTypes[Math.floor(Math.random() * incidentTypes.length)];
  const sev = severities[Math.floor(Math.random() * severities.length)];
  const inc = {
    id: Date.now() + Math.random(),
    ...tpl,
    severity: sev,
    x: 40 + Math.random() * (W - 80),
    y: 40 + Math.random() * (H - 80),
    active: true,
    pulse: 0,
    time: new Date(),
  };
  incidents.push(inc);
  addFeedItem(inc);
  document.getElementById('active-count').textContent = incidents.filter(i => i.active).length;
}

function addFeedItem(inc) {
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'feed-item ' + inc.type;
  const sevClass = 'sev-' + inc.severity;
  const timeStr = inc.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  div.innerHTML = `<span class="feed-severity ${sevClass}">${inc.severity.toUpperCase()}</span>
    <strong>${inc.icon} ${inc.type.charAt(0).toUpperCase() + inc.type.slice(1)}</strong><br>
    <span class="feed-time">${timeStr} — (${Math.round(inc.x)}, ${Math.round(inc.y)})</span>`;
  feed.prepend(div);
  if (feed.children.length > 30) feed.removeChild(feed.lastChild);
}

function dispatch() {
  incidents.forEach(inc => {
    if (!inc.active) return;
    // Find matching available unit
    const matching = units.filter(u => !u.busy && u.type === inc.unit);
    if (matching.length === 0) {
      // Try any available
      const any = units.filter(u => !u.busy);
      if (any.length === 0) return;
      assignUnit(any, inc);
    } else {
      assignUnit(matching, inc);
    }
  });
}

function assignUnit(pool, inc) {
  let chosen;
  if (aiMode) {
    // Nearest unit (AI)
    let minDist = Infinity;
    pool.forEach(u => {
      const d = Math.hypot(u.x - inc.x, u.y - inc.y);
      if (d < minDist) { minDist = d; chosen = u; }
    });
  } else {
    // Random unit
    chosen = pool[Math.floor(Math.random() * pool.length)];
  }
  if (!chosen) return;
  chosen.busy = true;
  chosen.startX = chosen.x;
  chosen.startY = chosen.y;
  chosen.targetX = inc.x;
  chosen.targetY = inc.y;
  chosen.progress = 0;
  chosen.incidentId = inc.id;
  const dist = Math.hypot(chosen.x - inc.x, chosen.y - inc.y);
  chosen.travelTime = dist / 2; // frames
  const mode = aiMode ? 'ai' : 'random';
  responseTimes[mode].push(dist);
  updateAvgTimes();
  updateUnitCounts();
}

function updateUnitCounts() {
  document.getElementById('police-count').textContent = units.filter(u => u.type === 'police' && !u.busy).length;
  document.getElementById('fire-count').textContent = units.filter(u => u.type === 'fire' && !u.busy).length;
  document.getElementById('amb-count').textContent = units.filter(u => u.type === 'ambulance' && !u.busy).length;
}

function updateAvgTimes() {
  const avg = arr => arr.length ? (arr.reduce((a, b) => a + b, 0) / arr.length) : 0;
  const rAvg = avg(responseTimes.random);
  const aAvg = avg(responseTimes.ai);
  document.getElementById('avg-random').textContent = responseTimes.random.length ? (rAvg * 0.05).toFixed(1) + 'min' : '--';
  document.getElementById('avg-ai').textContent = responseTimes.ai.length ? (aAvg * 0.05).toFixed(1) + 'min' : '--';
  if (responseTimes.random.length && responseTimes.ai.length) {
    const saved = Math.max(0, ((rAvg - aAvg) * 0.05)).toFixed(1);
    document.getElementById('time-saved').textContent = saved + 'min';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Grid (streets)
  ctx.strokeStyle = darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  ctx.lineWidth = 1;
  for (let x = GRID; x < W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = GRID; y < H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Buildings (decorative blocks)
  ctx.fillStyle = darkMode ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.04)';
  for (let bx = GRID; bx < W - GRID; bx += GRID * 3) {
    for (let by = GRID; by < H - GRID; by += GRID * 3) {
      ctx.fillRect(bx + 4, by + 4, GRID * 2 - 8, GRID * 2 - 8);
    }
  }

  // Incidents
  incidents.forEach(inc => {
    if (!inc.active) return;
    inc.pulse = (inc.pulse + 0.05) % (Math.PI * 2);
    const pulseR = 12 + Math.sin(inc.pulse) * 4;
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = inc.color;
    ctx.beginPath();
    ctx.arc(inc.x, inc.y, pulseR + 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = inc.color;
    ctx.beginPath();
    ctx.arc(inc.x, inc.y, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '14px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(inc.icon, inc.x, inc.y);
  });

  // Units
  units.forEach(u => {
    if (u.busy && u.targetX !== null) {
      u.progress += 1;
      const t = Math.min(1, u.progress / u.travelTime);
      u.x = u.startX + (u.targetX - u.startX) * t;
      u.y = u.startY + (u.targetY - u.startY) * t;
      // Draw path
      ctx.strokeStyle = '#ff6600';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.moveTo(u.startX, u.startY);
      ctx.lineTo(u.targetX, u.targetY);
      ctx.stroke();
      ctx.setLineDash([]);
      if (t >= 1) {
        // Arrived - resolve
        const inc = incidents.find(i => i.id === u.incidentId);
        if (inc) {
          inc.active = false;
          resolved++;
          document.getElementById('resolved-count').textContent = resolved;
          document.getElementById('active-count').textContent = incidents.filter(i => i.active).length;
        }
        u.busy = false;
        u.targetX = null;
        updateUnitCounts();
      }
    }
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(u.icon, u.x, u.y);
  });

  requestAnimationFrame(draw);
}

// Events
document.getElementById('btn-dispatch').addEventListener('click', dispatch);
document.getElementById('mode-random').addEventListener('click', () => {
  aiMode = false;
  document.getElementById('mode-random').classList.add('active');
  document.getElementById('mode-ai').classList.remove('active');
});
document.getElementById('mode-ai').addEventListener('click', () => {
  aiMode = true;
  document.getElementById('mode-ai').classList.add('active');
  document.getElementById('mode-random').classList.remove('active');
});

resize();
initUnits();

// Auto-spawn incidents
setInterval(spawnIncident, 3000);
spawnIncident();
spawnIncident();

// Auto-dispatch every 5 seconds
setInterval(dispatch, 5000);

draw();
</script>
</body>
</html>
