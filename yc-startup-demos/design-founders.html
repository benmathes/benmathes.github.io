<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>More Design Founders</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f8f8;
  --surface: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666;
  --border: #e0e0e0;
  --accent: #ff6600;
  --accent-light: rgba(255, 102, 0, 0.15);
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --canvas-bg: #fafafa;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --text: #e8e8e8;
    --text-secondary: #999;
    --border: #333;
    --accent-light: rgba(255, 102, 0, 0.2);
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --canvas-bg: #141414;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}
.back-link {
  display: inline-block;
  padding: 12px 24px;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
}
.back-link:hover { opacity: 0.7; }
.top-bar {
  padding: 0 24px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.top-bar h1 { font-size: 22px; }
.badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; vertical-align: middle; }
.templates {
  display: flex;
  gap: 6px;
}
.tpl-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.tpl-btn:hover, .tpl-btn.active { border-color: var(--accent); color: var(--accent); }
.main-layout {
  display: grid;
  grid-template-columns: 60px 1fr 16px 1fr;
  height: calc(100vh - 100px);
}
.toolbar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}
.tool-btn {
  width: 44px; height: 44px;
  border: 2px solid transparent;
  border-radius: 8px;
  background: var(--bg);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.tool-btn:hover { border-color: var(--border); }
.tool-btn.active { border-color: var(--accent); background: var(--accent-light); }
.tool-btn .label {
  display: none;
}
.design-canvas {
  background: var(--canvas-bg);
  position: relative;
  overflow: hidden;
  cursor: crosshair;
}
.divider {
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.divider-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-90deg);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 2px;
  white-space: nowrap;
}
.preview-panel {
  background: var(--surface);
  overflow-y: auto;
  padding: 20px;
  border-left: 1px solid var(--border);
}
.preview-panel h3 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}
.design-el {
  position: absolute;
  border: 2px solid transparent;
  cursor: move;
  user-select: none;
  transition: box-shadow 0.15s;
}
.design-el:hover { box-shadow: 0 0 0 2px var(--accent); }
.design-el.selected { box-shadow: 0 0 0 2px var(--accent); }
.color-row {
  display: flex;
  gap: 4px;
  margin-top: 8px;
}
.color-swatch {
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.15s;
}
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--text); }
/* Preview prototype styles */
.proto-container {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--bg);
  min-height: 300px;
}
.proto-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.proto-dot { width: 8px; height: 8px; border-radius: 50%; }
.proto-body { padding: 16px; }
.proto-el {
  margin-bottom: 8px;
  transition: all 0.3s;
  animation: protoIn 0.4s ease;
}
@keyframes protoIn { from { opacity: 0; transform: translateY(8px); } }
.insight-box {
  background: var(--accent-light);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 12px;
  margin-top: 16px;
  line-height: 1.5;
}
.insight-box strong { color: var(--accent); }
</style>
</head>
<body>
<a href="index.html" class="back-link">← Back to all demos</a>
<div class="top-bar">
  <h1>More Design Founders <span class="badge">Summer 2025</span></h1>
  <div class="templates">
    <button class="tpl-btn" data-tpl="blank">Blank</button>
    <button class="tpl-btn" data-tpl="landing">Landing Page</button>
    <button class="tpl-btn" data-tpl="mobile">Mobile App</button>
    <button class="tpl-btn" data-tpl="dashboard">Dashboard</button>
  </div>
</div>
<div class="main-layout">
  <div class="toolbar">
    <button class="tool-btn active" data-tool="rect" title="Rectangle">▭</button>
    <button class="tool-btn" data-tool="circle" title="Circle">●</button>
    <button class="tool-btn" data-tool="text" title="Text">T</button>
    <button class="tool-btn" data-tool="button" title="Button">☐</button>
    <button class="tool-btn" data-tool="image" title="Image">🖼</button>
    <button class="tool-btn" data-tool="input" title="Input">⊟</button>
    <div style="flex:1"></div>
    <div class="color-row" style="flex-direction:column;">
      <div class="color-swatch active" data-color="#ff6600" style="background:#ff6600"></div>
      <div class="color-swatch" data-color="#2196f3" style="background:#2196f3"></div>
      <div class="color-swatch" data-color="#4caf50" style="background:#4caf50"></div>
      <div class="color-swatch" data-color="#9c27b0" style="background:#9c27b0"></div>
      <div class="color-swatch" data-color="#1a1a1a" style="background:#1a1a1a"></div>
      <div class="color-swatch" data-color="#e0e0e0" style="background:#e0e0e0"></div>
    </div>
  </div>
  <div class="design-canvas" id="design-canvas"></div>
  <div class="divider"><span class="divider-label">AI Interprets</span></div>
  <div class="preview-panel" id="preview-panel">
    <h3>AI-Generated Prototype</h3>
    <div class="proto-container" id="proto-container">
      <div class="proto-nav">
        <div class="proto-dot" style="background:#f44336"></div>
        <div class="proto-dot" style="background:#ff9800"></div>
        <div class="proto-dot" style="background:#4caf50"></div>
        <span style="flex:1;text-align:center;color:var(--text-secondary)">preview.app</span>
      </div>
      <div class="proto-body" id="proto-body">
        <p style="color:var(--text-secondary);font-size:13px;text-align:center;padding:40px 0;">Add elements to the canvas to generate a prototype</p>
      </div>
    </div>
    <div class="insight-box">
      <strong>The key insight:</strong> Designers can now build, not just design. With AI interpretation, a mockup becomes a working prototype instantly.
    </div>
  </div>
</div>
<script>
let currentTool = 'rect';
let currentColor = '#ff6600';
let elements = [];
let nextId = 1;
let dragging = null;
let dragStart = null;
let creating = null;
const canvas = document.getElementById('design-canvas');

// Tool selection
document.querySelectorAll('.tool-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
  });
});

document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentColor = sw.dataset.color;
  });
});

function addElement(type, x, y, w, h, color) {
  const el = { id: nextId++, type, x, y, w: w || 120, h: h || 60, color: color || currentColor };
  if (type === 'text') { el.text = 'Text'; el.h = 30; el.w = 80; }
  if (type === 'button') { el.text = 'Button'; el.h = 36; el.w = 100; }
  if (type === 'input') { el.text = 'Input field'; el.h = 36; el.w = 160; }
  if (type === 'circle') { el.w = 60; el.h = 60; }
  if (type === 'image') { el.w = 120; el.h = 80; }
  elements.push(el);
  renderCanvas();
  renderPrototype();
  return el;
}

function renderCanvas() {
  canvas.querySelectorAll('.design-el').forEach(e => e.remove());
  elements.forEach(el => {
    const div = document.createElement('div');
    div.className = 'design-el';
    div.dataset.id = el.id;
    div.style.left = el.x + 'px';
    div.style.top = el.y + 'px';
    div.style.width = el.w + 'px';
    div.style.height = el.h + 'px';

    switch (el.type) {
      case 'rect':
        div.style.background = el.color;
        div.style.borderRadius = '8px';
        div.style.opacity = '0.8';
        break;
      case 'circle':
        div.style.background = el.color;
        div.style.borderRadius = '50%';
        div.style.opacity = '0.8';
        break;
      case 'text':
        div.style.color = el.color;
        div.style.fontWeight = '700';
        div.style.fontSize = '16px';
        div.style.lineHeight = el.h + 'px';
        div.textContent = el.text;
        break;
      case 'button':
        div.style.background = el.color;
        div.style.borderRadius = '8px';
        div.style.color = 'white';
        div.style.fontSize = '13px';
        div.style.fontWeight = '600';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'center';
        div.textContent = el.text;
        break;
      case 'image':
        div.style.background = `repeating-linear-gradient(45deg, ${el.color}22, ${el.color}22 10px, ${el.color}11 10px, ${el.color}11 20px)`;
        div.style.border = `2px solid ${el.color}`;
        div.style.borderRadius = '8px';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'center';
        div.style.fontSize = '24px';
        div.textContent = '🖼';
        break;
      case 'input':
        div.style.border = `2px solid ${el.color}`;
        div.style.borderRadius = '8px';
        div.style.padding = '0 10px';
        div.style.fontSize = '12px';
        div.style.lineHeight = el.h + 'px';
        div.style.color = 'var(--text-secondary)';
        div.textContent = el.text;
        break;
    }

    // Drag
    div.addEventListener('mousedown', e => {
      e.stopPropagation();
      dragging = el;
      dragStart = { x: e.clientX - el.x, y: e.clientY - el.y };
      document.querySelectorAll('.design-el').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
    });

    canvas.appendChild(div);
  });
}

canvas.addEventListener('mousedown', e => {
  if (dragging) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  addElement(currentTool, x, y);
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  dragging.x = e.clientX - dragStart.x;
  dragging.y = e.clientY - dragStart.y;
  renderCanvas();
});

document.addEventListener('mouseup', () => {
  if (dragging) {
    dragging = null;
    renderPrototype();
  }
});

// Double-click to delete
canvas.addEventListener('dblclick', e => {
  const target = e.target.closest('.design-el');
  if (target) {
    const id = +target.dataset.id;
    elements = elements.filter(el => el.id !== id);
    renderCanvas();
    renderPrototype();
  }
});

function renderPrototype() {
  const body = document.getElementById('proto-body');
  if (elements.length === 0) {
    body.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;text-align:center;padding:40px 0;">Add elements to the canvas to generate a prototype</p>';
    return;
  }

  // Sort by y position to create logical flow
  const sorted = [...elements].sort((a, b) => a.y - b.y);
  let html = '';

  sorted.forEach(el => {
    switch (el.type) {
      case 'rect':
        html += `<div class="proto-el" style="background:${el.color};height:${Math.max(20, el.h * 0.5)}px;border-radius:8px;opacity:0.15;"></div>`;
        break;
      case 'circle':
        html += `<div class="proto-el" style="width:${el.w * 0.6}px;height:${el.h * 0.6}px;border-radius:50%;background:${el.color};opacity:0.8;"></div>`;
        break;
      case 'text':
        html += `<div class="proto-el" style="font-weight:700;font-size:16px;color:${el.color};">${el.text}</div>`;
        break;
      case 'button':
        html += `<button class="proto-el" style="display:block;padding:10px 24px;background:${el.color};color:white;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;" onclick="this.style.transform='scale(0.95)';setTimeout(()=>this.style.transform='',150)">${el.text}</button>`;
        break;
      case 'image':
        html += `<div class="proto-el" style="background:linear-gradient(135deg,${el.color}22,${el.color}44);border-radius:8px;height:60px;display:flex;align-items:center;justify-content:center;font-size:20px;">🖼 Image placeholder</div>`;
        break;
      case 'input':
        html += `<input class="proto-el" type="text" placeholder="${el.text}" style="display:block;width:100%;padding:10px 14px;border:2px solid ${el.color};border-radius:8px;font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);">`;
        break;
    }
  });

  body.innerHTML = html;
}

// Templates
function loadTemplate(name) {
  elements = [];
  const canvasRect = canvas.getBoundingClientRect();
  const cw = canvasRect.width;

  if (name === 'landing') {
    addElement('rect', 20, 10, cw - 40, 50, '#1a1a1a');
    addElement('text', 40, 80, 200, 40, '#ff6600');
    elements[elements.length - 1].text = 'Welcome';
    addElement('text', 40, 120, 300, 30, '#666666');
    elements[elements.length - 1].text = 'Build something amazing';
    addElement('button', 40, 170, 140, 40, '#ff6600');
    elements[elements.length - 1].text = 'Get Started';
    addElement('image', 40, 230, cw - 80, 100, '#2196f3');
    addElement('rect', 40, 350, (cw - 100) / 3, 80, '#4caf50');
    addElement('rect', 60 + (cw - 100) / 3, 350, (cw - 100) / 3, 80, '#ff6600');
    addElement('rect', 80 + 2 * (cw - 100) / 3, 350, (cw - 100) / 3, 80, '#2196f3');
  } else if (name === 'mobile') {
    const mx = cw / 2 - 90;
    addElement('rect', mx, 10, 180, 400, '#e0e0e0');
    addElement('rect', mx + 10, 20, 160, 40, '#ff6600');
    addElement('circle', mx + 20, 80, 50, 50, '#2196f3');
    addElement('text', mx + 80, 90, 100, 30, '#1a1a1a');
    elements[elements.length - 1].text = 'Profile';
    addElement('rect', mx + 10, 150, 160, 30, '#e0e0e0');
    addElement('rect', mx + 10, 190, 160, 30, '#e0e0e0');
    addElement('rect', mx + 10, 230, 160, 30, '#e0e0e0');
    addElement('button', mx + 20, 290, 140, 36, '#4caf50');
    elements[elements.length - 1].text = 'Continue';
    addElement('rect', mx + 10, 360, 160, 40, '#1a1a1a');
  } else if (name === 'dashboard') {
    addElement('rect', 0, 0, 60, 400, '#1a1a1a');
    addElement('rect', 80, 10, cw - 100, 40, '#e0e0e0');
    addElement('input', 90, 18, 200, 28, '#999');
    elements[elements.length - 1].text = 'Search...';
    addElement('rect', 80, 70, (cw - 120) / 3, 80, '#ff6600');
    addElement('rect', 100 + (cw - 120) / 3, 70, (cw - 120) / 3, 80, '#2196f3');
    addElement('rect', 120 + 2 * (cw - 120) / 3, 70, (cw - 120) / 3, 80, '#4caf50');
    addElement('rect', 80, 170, cw - 100, 120, '#e0e0e0');
    addElement('text', 90, 180, 100, 20, '#1a1a1a');
    elements[elements.length - 1].text = 'Chart';
    addElement('rect', 80, 310, (cw - 110) / 2, 100, '#e0e0e0');
    addElement('rect', 95 + (cw - 110) / 2, 310, (cw - 110) / 2, 100, '#e0e0e0');
  }

  renderCanvas();
  renderPrototype();
}

document.querySelectorAll('.tpl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadTemplate(btn.dataset.tpl);
  });
});

renderCanvas();
</script>
</body>
</html>
