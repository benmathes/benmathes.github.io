<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOBSTER PITCH: A YC Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }
  #game-container {
    width: 800px;
    border: 3px solid #ff6600;
    box-shadow: 0 0 30px #ff660055, 0 0 60px #ff660022;
    background: #111;
    image-rendering: pixelated;
  }
  #title-bar {
    background: linear-gradient(90deg, #ff6600, #ff9933, #ff6600);
    color: #000;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    padding: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #scene-canvas {
    width: 800px;
    height: 340px;
    display: block;
    background: #1a1a2e;
    image-rendering: pixelated;
  }
  #dialogue-box {
    background: #0d0d1a;
    border-top: 2px solid #ff6600;
    padding: 12px 16px;
    min-height: 90px;
    position: relative;
  }
  #speaker-name {
    color: #ff9933;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #dialogue-text {
    color: #d0d0d0;
    font-size: 13px;
    line-height: 1.6;
    min-height: 40px;
  }
  #choices-area {
    background: #080814;
    border-top: 1px solid #333;
    padding: 10px 16px;
    min-height: 110px;
  }
  #choices-label {
    color: #666;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .choice-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid #222;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 10px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.1s;
    line-height: 1.4;
  }
  .choice-btn:hover {
    background: #1a1a2e;
    border-color: #ff6600;
    color: #ff9933;
  }
  .choice-btn::before {
    content: '▶ ';
    color: #ff6600;
    opacity: 0;
  }
  .choice-btn:hover::before { opacity: 1; }
  #status-bar {
    background: #050510;
    border-top: 1px solid #222;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }
  #yc-meter-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #yc-meter-bar {
    width: 120px;
    height: 8px;
    background: #111;
    border: 1px solid #333;
    position: relative;
  }
  #yc-meter-fill {
    height: 100%;
    background: linear-gradient(90deg, #333, #ff6600);
    width: 0%;
    transition: width 0.5s;
  }
  #typing-indicator {
    color: #ff6600;
    font-size: 11px;
    animation: blink 0.8s step-end infinite;
    display: none;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .outcome-screen {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .outcome-screen h2 {
    font-size: 24px;
    margin-bottom: 20px;
  }
  .outcome-screen p {
    font-size: 14px;
    line-height: 1.8;
    max-width: 600px;
    margin: 0 auto 20px;
    color: #bbb;
  }
  #restart-btn {
    background: #ff6600;
    color: #000;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 10px;
  }
  #restart-btn:hover { background: #ff9933; }
  .win-color { color: #33ff66; }
  .lose-color { color: #ff3333; }
  #notification-popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 11px;
    color: #999;
    max-width: 220px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #notification-popup.show { opacity: 1; }
  .notif-icon { font-size: 16px; display: inline-block; margin-right: 6px; }
</style>
</head>
<body>

<div id="notification-popup"><span class="notif-icon">⌚</span><span id="notif-text"></span></div>

<div id="game-container">
  <div id="title-bar">✦ LOBSTER PITCH: A YC ADVENTURE ✦ &nbsp;|&nbsp; SPRING 26 BATCH &nbsp;|&nbsp; PRESS ANY KEY TO FUND</div>
  <canvas id="scene-canvas" width="800" height="340"></canvas>
  <div id="dialogue-box">
    <div id="speaker-name">GARRY TAN</div>
    <div id="dialogue-text"></div>
    <span id="typing-indicator">█</span>
  </div>
  <div id="choices-area">
    <div id="choices-label">What do you say?</div>
    <div id="choices-container"></div>
  </div>
  <div id="status-bar">
    <span>YC SPRING 26 INTERVIEW</span>
    <div id="yc-meter-container">
      <span>VIBES:</span>
      <div id="yc-meter-bar"><div id="yc-meter-fill"></div></div>
      <span id="yc-meter-pct">0%</span>
    </div>
    <span id="status-right">OFFICE: YC HQ, SF</span>
  </div>
</div>

<script>
// ─── PIXEL ART RENDERER ───────────────────────────────────────────────────────
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const S = 2; // scale factor (each "pixel" = 2x2)

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * S, y * S, w * S, h * S);
}

function drawScene(garryMood, playerMood) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── Background ──
  // Wall
  ctx.fillStyle = '#1a1240';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Wall paneling
  for (let i = 0; i < 800; i += 80) {
    ctx.fillStyle = '#1e1548';
    ctx.fillRect(i * S/S, 0, 2, canvas.height);
  }

  // Floor
  ctx.fillStyle = '#2a1f0e';
  ctx.fillRect(0, 240, 800, 100);
  ctx.fillStyle = '#231a0b';
  for (let i = 0; i < 800; i += 60) {
    ctx.fillRect(i, 240, 2, 100);
  }

  // YC logo on wall
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('YC', 360, 60);
  ctx.font = '11px monospace';
  ctx.fillStyle = '#ff660088';
  ctx.fillText('Y COMBINATOR', 330, 75);

  // Motivational posters
  drawPoster(30, 30, 'MOVE FAST', '#ff6600');
  drawPoster(600, 30, 'DEFAULT ALIVE', '#33ff66');

  // ── Desk ──
  ctx.fillStyle = '#5c3d1e';
  ctx.fillRect(200, 195, 400, 12);
  ctx.fillStyle = '#4a3010';
  ctx.fillRect(200, 207, 400, 30);

  // Desk legs
  ctx.fillStyle = '#3a2508';
  ctx.fillRect(220, 237, 16, 60);
  ctx.fillRect(564, 237, 16, 60);

  // ── On the desk ──
  // MacBook (left)
  ctx.fillStyle = '#555';
  ctx.fillRect(230, 175, 80, 52);
  ctx.fillStyle = '#111';
  ctx.fillRect(233, 178, 74, 42);
  ctx.fillStyle = '#0a0';
  ctx.font = '9px monospace';
  ctx.fillText('vim', 243, 205);
  ctx.fillStyle = '#0f0';
  ctx.font = '8px monospace';
  ctx.fillText('2000 LOC/min', 238, 218);

  // MacBook (right)
  ctx.fillStyle = '#555';
  ctx.fillRect(490, 175, 80, 52);
  ctx.fillStyle = '#111';
  ctx.fillRect(493, 178, 74, 42);
  ctx.fillStyle = '#0a0';
  ctx.font = '9px monospace';
  ctx.fillText('gstack', 498, 202);
  ctx.fillStyle = '#33f';
  ctx.font = '8px monospace';
  ctx.fillText('DEPLOYING...', 496, 216);

  // Coffee mug
  ctx.fillStyle = '#888';
  ctx.fillRect(350, 185, 18, 14);
  ctx.fillStyle = '#333';
  ctx.fillRect(352, 187, 14, 10);
  ctx.fillStyle = '#ff9900';
  ctx.font = '6px monospace';
  ctx.fillText('YC', 353, 195);

  // ── GARRY TAN (right side of desk, lobster suit) ──
  drawGarry(460, 60, garryMood);

  // ── PLAYER (left side) ──
  drawPlayer(140, 100, playerMood);

  // ── Name plates ──
  drawNameTag(420, 290, 'GARRY TAN', '#ff6600');
  drawNameTag(80, 290, 'YOU', '#33aaff');
}

function drawPoster(x, y, text, color) {
  ctx.fillStyle = '#0d0d25';
  ctx.fillRect(x, y, 90, 55);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 90, 55);
  ctx.fillStyle = color;
  ctx.font = 'bold 9px monospace';
  ctx.fillText(text, x + 8, y + 32);
}

function drawNameTag(x, y, text, color) {
  ctx.fillStyle = '#0005';
  ctx.fillRect(x - 2, y, text.length * 7.5 + 8, 18);
  ctx.fillStyle = color;
  ctx.font = '10px monospace';
  ctx.fillText(text, x + 2, y + 13);
}

function drawGarry(x, y, mood) {
  // Lobster body (torso) - bright red
  px(x+4,  y+18, 22, 30, '#cc2200'); // main torso
  px(x+2,  y+20, 4, 24, '#aa1a00');  // left shell
  px(x+26, y+20, 4, 24, '#aa1a00');  // right shell

  // Lobster shell segments on torso
  px(x+4, y+22, 22, 2, '#dd3300');
  px(x+4, y+28, 22, 2, '#dd3300');
  px(x+4, y+34, 22, 2, '#dd3300');
  px(x+4, y+40, 22, 2, '#dd3300');

  // Lobster tail
  px(x+6,  y+48, 18, 8, '#cc2200');
  px(x+4,  y+52, 6, 12, '#aa1a00');
  px(x+10, y+52, 6, 12, '#bb2000');
  px(x+16, y+52, 6, 12, '#aa1a00');
  px(x+22, y+52, 6, 10, '#993300');

  // Lobster claws
  px(x-8, y+22, 10, 14, '#cc2200'); // left claw base
  px(x-14, y+18, 10, 8, '#dd3300'); // left upper claw
  px(x-14, y+28, 10, 6, '#bb1e00'); // left lower claw
  px(x-16, y+24, 2, 4, '#ff4422');  // left claw gap

  px(x+28, y+22, 10, 14, '#cc2200'); // right claw base
  px(x+34, y+18, 10, 8, '#dd3300');  // right upper claw
  px(x+34, y+28, 10, 6, '#bb1e00');  // right lower claw
  px(x+46, y+24, 2, 4, '#ff4422');   // right claw gap

  // Typing arms (in lobster suit, claw tips on keyboards)
  px(x-6, y+36, 8, 3, '#cc2200');
  px(x+28, y+36, 8, 3, '#cc2200');

  // Human head poking out top
  // Neck
  px(x+9, y+10, 12, 10, '#e8b88a');

  // Head
  px(x+7, y-14, 16, 24, '#e8b88a');

  // Hair
  px(x+7, y-14, 16, 5, '#1a0a00');
  px(x+5, y-12, 4, 8, '#1a0a00');

  // Garry's glasses
  px(x+8, y-2, 6, 4, '#111');   // left lens
  px(x+16, y-2, 6, 4, '#111');  // right lens
  px(x+14, y-1, 2, 2, '#666');  // bridge

  // Eyes behind glasses
  px(x+9, y-1, 4, 2, '#222');
  px(x+17, y-1, 4, 2, '#222');

  // Mouth / expression
  if (mood === 'normal') {
    px(x+11, y+5, 8, 2, '#c09070');
  } else if (mood === 'typing') {
    px(x+11, y+5, 8, 2, '#c09070');
    // add strobe light watch visual
    px(x+34, y+30, 8, 6, '#ffffff');
    ctx.fillStyle = '#fff';
    ctx.font = '8px monospace';
    ctx.fillText('⌚', (x+34)*S, (y+38)*S);
  } else if (mood === 'shocked') {
    px(x+11, y+4, 8, 3, '#c09070'); // open mouth
    px(x+12, y+5, 6, 2, '#222');
  } else if (mood === 'triumphant') {
    // big grin
    px(x+10, y+5, 10, 2, '#ff9966');
    px(x+10, y+7, 2, 2, '#ff9966');
    px(x+18, y+7, 2, 2, '#ff9966');
  } else if (mood === 'excited') {
    px(x+10, y+4, 10, 4, '#ff9966');
    px(x+11, y+5, 8, 2, '#eee');
  }

  // Antennae
  ctx.strokeStyle = '#cc2200';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo((x+10)*S, (y-14)*S); ctx.lineTo((x+4)*S, (y-26)*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo((x+20)*S, (y-14)*S); ctx.lineTo((x+26)*S, (y-26)*S); ctx.stroke();

  // Antennae tips
  px(x+3, y-28, 3, 3, '#ff4422');
  px(x+25, y-28, 3, 3, '#ff4422');

  // Apple Watch strobe
  if (mood === 'typing' || mood === 'triumphant') {
    const t = Date.now() % 400;
    const watchColor = t < 200 ? '#33ff66' : '#ff3366';
    px(x+29, y+30, 7, 5, watchColor);
  }

  // "YC Partner" badge
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 8px monospace';
  ctx.fillText('YC Partner', (x-4)*S, (y+75)*S);
}

function drawPlayer(x, y, mood) {
  // Body / blazer
  px(x+2, y+20, 26, 35, '#2a4a7a');
  px(x+10, y+20, 10, 35, '#cccccc'); // shirt
  px(x+2, y+20, 8, 35, '#1a3a6a');   // left lapel
  px(x+20, y+20, 8, 35, '#1a3a6a');  // right lapel

  // Tie
  px(x+12, y+22, 6, 28, '#cc3300');
  px(x+13, y+22, 4, 3, '#881100');

  // Arms
  px(x-2, y+22, 6, 26, '#2a4a7a');
  px(x+26, y+22, 6, 26, '#2a4a7a');
  // Hands
  px(x-4, y+46, 8, 8, '#e8b88a');
  px(x+26, y+46, 8, 8, '#e8b88a');

  // Legs
  px(x+4, y+55, 8, 22, '#1a3060');
  px(x+18, y+55, 8, 22, '#1a3060');
  px(x+4, y+75, 8, 5, '#111');   // shoes
  px(x+18, y+75, 8, 5, '#111');

  // Neck
  px(x+11, y+12, 8, 10, '#e8b88a');

  // Head
  px(x+7, y-12, 16, 24, '#e8b88a');

  // Hair
  px(x+7, y-12, 16, 4, '#4a2800');
  px(x+5, y-10, 4, 6, '#4a2800');
  px(x+21, y-10, 4, 4, '#4a2800');

  // Eyes
  if (mood === 'nervous') {
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // sweat drop
    px(x+24, y-2, 2, 4, '#88aaff');
  } else if (mood === 'confident') {
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // sparkle
    ctx.fillStyle = '#ffff00';
    ctx.font = '8px monospace';
    ctx.fillText('★', (x+22)*S, (y-2)*S);
  } else if (mood === 'shocked') {
    // big eyes
    px(x+9, y+1, 5, 5, '#fff');
    px(x+16, y+1, 5, 5, '#fff');
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // open mouth
    px(x+11, y+8, 8, 5, '#111');
  } else if (mood === 'defeated') {
    // sad eyes
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // tears
    px(x+10, y+6, 2, 6, '#88aaff');
    px(x+19, y+6, 2, 6, '#88aaff');
    // frown
    px(x+10, y+10, 10, 2, '#c09070');
    px(x+10, y+8, 2, 3, '#c09070');
    px(x+18, y+8, 2, 3, '#c09070');
  } else if (mood === 'pitch') {
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // talking mouth
    px(x+11, y+7, 8, 4, '#c09070');
    px(x+12, y+8, 6, 2, '#111');
  } else {
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    px(x+11, y+7, 8, 2, '#c09070');
  }

  // Holding phone or deck
  if (mood === 'shocked' || mood === 'defeated') {
    // Phone with dropping chart
    px(x+28, y+30, 10, 16, '#222');
    px(x+29, y+31, 8, 12, '#0a0a2a');
    ctx.fillStyle = '#ff3333';
    ctx.font = '7px monospace';
    ctx.fillText('📉', (x+28)*S, (y+42)*S);
  }

  // Startup lanyard
  ctx.strokeStyle = '#ff6600';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo((x+15)*S, (y+12)*S);
  ctx.lineTo((x+10)*S, (y+32)*S);
  ctx.lineTo((x+20)*S, (y+32)*S);
  ctx.stroke();
  px(x+9, y+32, 12, 8, '#fff');
  ctx.fillStyle = '#ff6600';
  ctx.font = '5px monospace';
  ctx.fillText('FNDME', (x+9)*S, (y+38)*S);
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let vibes = 0;
let currentNode = 'start';
let animFrame = null;
let typeTimer = null;
let displayedText = '';
let targetText = '';
let typeIndex = 0;
let garryMood = 'normal';
let playerMood = 'nervous';

const notifications = [
  '📱 Garry retweeted your competitor',
  '⌚ Calendar: 47 more pitches today',
  '📧 gstack.ai: 1,247 new signups',
  '💬 Marc Andreessen: "lgtm"',
  '📱 New commit: vibe-coded entire SaaS',
  '⌚ Notification: You have 0 notifications',
  '📧 From: Sam Altman — "same"',
  '⌚ Stand reminder (ignored)',
  '📱 PG essay published: "Do Things"',
  '💬 New Hacker News post about you',
];
let notifIndex = 0;

function showNotification() {
  const el = document.getElementById('notification-popup');
  document.getElementById('notif-text').textContent = notifications[notifIndex % notifications.length];
  notifIndex++;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Randomly flash notifications
setInterval(() => {
  if (Math.random() < 0.4) showNotification();
}, 3500);

// ─── DIALOGUE TREE ────────────────────────────────────────────────────────────
// vibesDelta: how much vibes change. Only ONE path leads to win.
// The winning path requires specific choices that accumulate vibes >= 80.

const tree = {
  start: {
    speaker: 'GARRY TAN',
    text: 'So... what do you guys do?',
    garry: 'normal',
    player: 'pitch',
    vibesDelta: 0,
    choices: [
      { text: 'We\'re building an AI-powered B2B SaaS platform that leverages machine learning to synergize enterprise workflows with blockchain-verified cloud infrastructure.', next: 'too_buzzword' },
      { text: 'We make it 10x cheaper for small restaurants to manage inventory. $8k MRR, growing 20% week over week.', next: 'good_start', vibesDelta: 20 },
      { text: 'Honestly? We\'re not totally sure yet. We\'re still finding product-market fit in the problem space.', next: 'no_clue' },
      { text: '[Say nothing. Maintain intense eye contact for 45 seconds.]', next: 'eye_contact' },
    ]
  },

  too_buzzword: {
    speaker: 'GARRY TAN',
    text: '*furious typing on both keyboards simultaneously* I have deployed an AI that understood your pitch, built a competitor, and already has 400 users. Continue.',
    garry: 'typing',
    player: 'nervous',
    vibesDelta: -10,
    choices: [
      { text: 'Okay okay — we help restaurants track inventory. $8k MRR, 20% WoW growth.', next: 'recovery_pitch', vibesDelta: 10 },
      { text: 'But our blockchain layer is truly differentiated—', next: 'blockchain_trap' },
      { text: 'I... I can see you\'re already funding us so maybe we skip to the term sheet?', next: 'skip_to_term_sheet' },
    ]
  },

  no_clue: {
    speaker: 'GARRY TAN',
    text: 'I respect the honesty. Rare. Most founders lie to me AND themselves. What problem keeps your first 10 users up at night?',
    garry: 'normal',
    player: 'nervous',
    vibesDelta: 5,
    choices: [
      { text: 'Restaurant owners spending 6 hours a week manually counting inventory when they could be cooking.', next: 'specific_problem', vibesDelta: 15 },
      { text: 'The general pain of... enterprise... digital transformation.', next: 'enterprise_buzzword_2' },
      { text: 'Honestly I need to call my co-founder, they handle the customer stuff.', next: 'call_cofounder' },
    ]
  },

  eye_contact: {
    speaker: 'GARRY TAN',
    text: '*stares back* *typing intensifies* *Apple Watch flashes Morse code* *neither of you blinks* *45 seconds pass* *Garry\'s left claw slowly raises* ..........Bold.',
    garry: 'typing',
    player: 'confident',
    vibesDelta: 5,
    choices: [
      { text: 'We make it 10x cheaper for small restaurants to manage inventory.', next: 'good_start', vibesDelta: 15 },
      { text: '[Continue staring. This is a dominance display now.]', next: 'stare_off' },
    ]
  },

  stare_off: {
    speaker: 'GARRY TAN',
    text: '*Garry closes both MacBooks* *removes glasses* *begins staring with full lobster-intensity* His Apple Watch has gone dark. He has transcended notifications. You are now in a staring contest with the future of tech.',
    garry: 'shocked',
    player: 'confident',
    vibesDelta: -5,
    choices: [
      { text: '[Blink. Just blink. Be human.]', next: 'blink_human' },
      { text: '[Do not blink. You were born for this moment.]', next: 'never_blink' },
    ]

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
function setVibes(v) {
  vibes = Math.max(0, Math.min(100, v));
  const pct = vibes + '%';
  document.getElementById('yc-meter-fill').style.width = pct;
  document.getElementById('yc-meter-pct').textContent = vibes + '%';
}

function typeText(text, cb) {
  const el = document.getElementById('dialogue-text');
  const ind = document.getElementById('typing-indicator');
  el.textContent = '';
  ind.style.display = 'inline';
  let i = 0;
  clearInterval(typeTimer);
  typeTimer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typeTimer);
      ind.style.display = 'none';
      if (cb) cb();
    }
  }, 18);
}

function renderNode(nodeId) {
  currentNode = nodeId;
  const node = tree[nodeId];

  if (node.outcome) {
    showOutcome(node.outcome, node.reason);
    return;
  }

  // Apply vibes
  if (node.vibesDelta) setVibes(vibes + node.vibesDelta);

  // Update moods
  garryMood = node.garry || 'normal';
  playerMood = node.player || 'nervous';
  drawScene(garryMood, playerMood);

  // Speaker name
  document.getElementById('speaker-name').textContent = node.speaker || 'GARRY TAN';

  // Type dialogue
  typeText(node.text, () => {
    // Render choices
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    (node.choices || []).forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.addEventListener('click', () => {
        const nextId = choice.next;
        const nextNode = tree[nextId];
        // Apply choice-level vibes delta
        if (choice.vibesDelta) setVibes(vibes + choice.vibesDelta);
        // Check if outcome
        if (choice.isOutcome || (nextNode && nextNode.outcome)) {
          renderNode(nextId);
        } else {
          renderNode(nextId);
        }
      });
      container.appendChild(btn);
    });
  });
}

function showOutcome(type, reason) {
  // Clear dialogue
  document.getElementById('dialogue-text').textContent = '';
  document.getElementById('speaker-name').textContent = '';
  document.getElementById('choices-container').innerHTML = '';
  document.getElementById('typing-indicator').style.display = 'none';

  if (type === 'win') {
    garryMood = 'triumphant';
    playerMood = 'confident';
    setVibes(100);
    drawScene(garryMood, playerMood);

    document.getElementById('dialogue-text').innerHTML =
      '<span style="color:#33ff66;font-size:16px;font-weight:bold;">★ CONGRATULATIONS ★</span><br><br>' +
      'Garry\'s lobster claws clap together three times. His Apple Watch plays a tiny fanfare. Both MacBooks simultaneously open a single tab: your company\'s YC application, marked ACCEPTED.<br><br>' +
      'He reaches across the desk with one claw. You shake it. It\'s firmer than you expected. Warmer too.<br><br>' +
      '<span style="color:#ff9933">"Don\'t make me regret this. And get Lucia\'s Tacos to 500 locations."</span><br><br>' +
      '<em style="color:#666">You have been accepted to Y Combinator Spring \'26. The lobster suit was never explained.</em>';

    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '▶ PLAY AGAIN';
    btn.addEventListener('click', resetGame);
    document.getElementById('choices-container').appendChild(btn);

  } else {
    garryMood = 'typing';
    playerMood = 'defeated';
    setVibes(Math.max(0, vibes - 20));
    drawScene(garryMood, playerMood);

    document.getElementById('dialogue-text').innerHTML =
      '<span style="color:#ff3333;font-size:16px;font-weight:bold;">✗ NOT ADMITTED</span><br><br>' +
      (reason || 'You have no moat.') + '<br><br>' +
      '<em style="color:#666">Thank you for playing. Garry is already building your replacement.</em>';

    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '▶ TRY AGAIN';
    btn.addEventListener('click', resetGame);
    document.getElementById('choices-container').appendChild(btn);
  }
}

function resetGame() {
  vibes = 0;
  setVibes(0);
  garryMood = 'normal';
  playerMood = 'nervous';
  renderNode('start');
}

// ─── ANIMATION LOOP (for watch strobe) ───────────────────────────────────────
function animLoop() {
  if (garryMood === 'typing' || garryMood === 'triumphant') {
    drawScene(garryMood, playerMood);
  }
  animFrame = requestAnimationFrame(animLoop);
}

// ─── START ────────────────────────────────────────────────────────────────────
drawScene('normal', 'nervous');
renderNode('start');
animLoop();
</script>
</body>
</html>
