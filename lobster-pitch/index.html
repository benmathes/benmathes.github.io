<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOBSTER PITCH: A YC Adventure</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
  }
  #game-container {
    width: 800px;
    border: 3px solid #ff6600;
    box-shadow: 0 0 30px #ff660055, 0 0 60px #ff660022;
    background: #111;
    image-rendering: pixelated;
  }
  #title-bar {
    background: linear-gradient(90deg, #ff6600, #ff9933, #ff6600);
    color: #000;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    padding: 4px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #scene-canvas {
    width: 800px;
    height: 340px;
    display: block;
    background: #1a1a2e;
    image-rendering: pixelated;
  }
  #dialogue-box {
    background: #0d0d1a;
    border-top: 2px solid #ff6600;
    padding: 12px 16px;
    min-height: 90px;
    position: relative;
  }
  #speaker-name {
    color: #ff9933;
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #dialogue-text {
    color: #d0d0d0;
    font-size: 13px;
    line-height: 1.6;
    min-height: 40px;
  }
  #choices-area {
    background: #080814;
    border-top: 1px solid #333;
    padding: 10px 16px;
    min-height: 110px;
  }
  #choices-label {
    color: #666;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .choice-btn {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid #222;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 7px 10px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.1s;
    line-height: 1.4;
  }
  .choice-btn:hover {
    background: #1a1a2e;
    border-color: #ff6600;
    color: #ff9933;
  }
  .choice-btn::before {
    content: '▶ ';
    color: #ff6600;
    opacity: 0;
  }
  .choice-btn:hover::before { opacity: 1; }
  #status-bar {
    background: #050510;
    border-top: 1px solid #222;
    padding: 5px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
  }
  #yc-meter-container {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #yc-meter-bar {
    width: 120px;
    height: 8px;
    background: #111;
    border: 1px solid #333;
    position: relative;
  }
  #yc-meter-fill {
    height: 100%;
    background: linear-gradient(90deg, #333, #ff6600);
    width: 0%;
    transition: width 0.5s;
  }
  #typing-indicator {
    color: #ff6600;
    font-size: 11px;
    animation: blink 0.8s step-end infinite;
    display: none;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .outcome-screen {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .outcome-screen h2 {
    font-size: 24px;
    margin-bottom: 20px;
  }
  .outcome-screen p {
    font-size: 14px;
    line-height: 1.8;
    max-width: 600px;
    margin: 0 auto 20px;
    color: #bbb;
  }
  #restart-btn {
    background: #ff6600;
    color: #000;
    border: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 10px;
  }
  #restart-btn:hover { background: #ff9933; }
  .win-color { color: #33ff66; }
  .lose-color { color: #ff3333; }
  #mute-btn {
    position: absolute;
    top: 6px;
    right: 10px;
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 2px 8px;
    cursor: pointer;
    z-index: 10;
  }
  #mute-btn:hover { color: #ff9933; border-color: #ff6600; }
  #notification-popup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 11px;
    color: #999;
    max-width: 220px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  #notification-popup.show { opacity: 1; }
  .notif-icon { font-size: 16px; display: inline-block; margin-right: 6px; }
</style>
</head>
<body>

<div id="notification-popup"><span class="notif-icon">⌚</span><span id="notif-text"></span></div>

<div id="game-container" style="position:relative">
  <div id="title-bar">✦ LOBSTER PITCH: A YC ADVENTURE ✦ &nbsp;|&nbsp; SPRING 26 BATCH &nbsp;|&nbsp; PRESS ANY KEY TO FUND</div>
  <button id="mute-btn" onclick="toggleMute()">♪ SOUND</button>
  <canvas id="scene-canvas" width="800" height="340"></canvas>
  <div id="dialogue-box">
    <div id="speaker-name">GARRY TAN</div>
    <div id="dialogue-text"></div>
    <span id="typing-indicator">█</span>
  </div>
  <div id="choices-area">
    <div id="choices-label">What do you say?</div>
    <div id="choices-container"></div>
  </div>
  <div id="status-bar">
    <span>YC SPRING 26 INTERVIEW</span>
    <div id="yc-meter-container">
      <span>VIBES:</span>
      <div id="yc-meter-bar"><div id="yc-meter-fill"></div></div>
      <span id="yc-meter-pct">0%</span>
    </div>
    <span id="status-right">OFFICE: YC HQ, SF</span>
  </div>
</div>

<script>
// ─── PIXEL ART RENDERER ───────────────────────────────────────────────────────
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const S = 2; // scale factor (each "pixel" = 2x2)

function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x * S, y * S, w * S, h * S);
}

function drawScene(garryMood, playerMood) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── Background ──
  // Wall
  ctx.fillStyle = '#1a1240';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Wall paneling
  for (let i = 0; i < 800; i += 80) {
    ctx.fillStyle = '#1e1548';
    ctx.fillRect(i * S/S, 0, 2, canvas.height);
  }

  // Floor
  ctx.fillStyle = '#2a1f0e';
  ctx.fillRect(0, 240, 800, 100);
  ctx.fillStyle = '#231a0b';
  for (let i = 0; i < 800; i += 60) {
    ctx.fillRect(i, 240, 2, 100);
  }

  // YC logo on wall
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('YC', 360, 60);
  ctx.font = '11px monospace';
  ctx.fillStyle = '#ff660088';
  ctx.fillText('Y COMBINATOR', 330, 75);

  // Motivational posters
  drawPoster(170, 30, 'MOVE FAST', '#ff6600');
  drawPoster(620, 30, 'DEFAULT ALIVE', '#33ff66');

  // ── PLAYER (left side, in front of desk) ──
  // Draw player BEFORE desk so they appear in front
  drawPlayer(30, 75, playerMood);

  // ── Desk (shifted right to make room for player) ──
  ctx.fillStyle = '#5c3d1e';
  ctx.fillRect(260, 195, 380, 12);
  ctx.fillStyle = '#4a3010';
  ctx.fillRect(260, 207, 380, 30);

  // Desk legs
  ctx.fillStyle = '#3a2508';
  ctx.fillRect(280, 237, 16, 60);
  ctx.fillRect(604, 237, 16, 60);

  // ── On the desk ──
  // MacBook (left)
  ctx.fillStyle = '#555';
  ctx.fillRect(290, 175, 80, 52);
  ctx.fillStyle = '#111';
  ctx.fillRect(293, 178, 74, 42);
  ctx.fillStyle = '#0a0';
  ctx.font = '9px monospace';
  ctx.fillText('vim', 303, 205);
  ctx.fillStyle = '#0f0';
  ctx.font = '8px monospace';
  ctx.fillText('2000 LOC/min', 298, 218);

  // MacBook (right)
  ctx.fillStyle = '#555';
  ctx.fillRect(530, 175, 80, 52);
  ctx.fillStyle = '#111';
  ctx.fillRect(533, 178, 74, 42);
  ctx.fillStyle = '#0a0';
  ctx.font = '9px monospace';
  ctx.fillText('gstack', 538, 202);
  ctx.fillStyle = '#33f';
  ctx.font = '8px monospace';
  ctx.fillText('DEPLOYING...', 536, 216);

  // Coffee mug
  ctx.fillStyle = '#888';
  ctx.fillRect(440, 185, 18, 14);
  ctx.fillStyle = '#333';
  ctx.fillRect(442, 187, 14, 10);
  ctx.fillStyle = '#ff9900';
  ctx.font = '6px monospace';
  ctx.fillText('YC', 443, 195);

  // ── GARRY TAN (right side, behind desk, lobster suit) ──
  drawGarry(340, 50, garryMood);
}

function drawPoster(x, y, text, color) {
  ctx.fillStyle = '#0d0d25';
  ctx.fillRect(x, y, 90, 55);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, 90, 55);
  ctx.fillStyle = color;
  ctx.font = 'bold 9px monospace';
  ctx.fillText(text, x + 8, y + 32);
}

function drawNameTag(x, y, text, color) {
  ctx.fillStyle = '#0005';
  ctx.fillRect(x - 2, y, text.length * 7.5 + 8, 18);
  ctx.fillStyle = color;
  ctx.font = '10px monospace';
  ctx.fillText(text, x + 2, y + 13);
}

function drawGarry(x, y, mood) {
  const t = Date.now();

  // Stan-style animated arm offsets (wild, independent, never-stop gesticulating)
  // Left arm: fast sinusoidal flail at different frequencies
  const lArmAngle = Math.sin(t / 120) * 0.7 + Math.sin(t / 73) * 0.4;
  const lClawY = Math.sin(t / 90) * 12 + Math.cos(t / 150) * 6;
  const lClawX = Math.cos(t / 110) * 15 - 20;
  // Right arm: offset phase, different speed (like Stan's asymmetric flailing)
  const rArmAngle = Math.sin(t / 95 + 2) * 0.6 + Math.cos(t / 130) * 0.5;
  const rClawY = Math.cos(t / 80 + 1) * 14 + Math.sin(t / 170) * 5;
  const rClawX = Math.sin(t / 100 + 3) * 15 + 50;

  // Lobster body (torso) - bright red, bigger for center stage
  px(x+2,  y+18, 26, 34, '#cc2200'); // main torso
  px(x-2,  y+20, 6, 28, '#aa1a00');  // left shell ridge
  px(x+26, y+20, 6, 28, '#aa1a00');  // right shell ridge

  // Lobster shell segments on torso (horizontal ridges)
  for (let seg = 0; seg < 5; seg++) {
    px(x+2, y+22 + seg*6, 26, 2, '#dd3300');
  }

  // Lobster tail (visible below desk line)
  px(x+4,  y+52, 22, 8, '#cc2200');
  px(x+2,  y+56, 6, 14, '#aa1a00');
  px(x+8,  y+56, 8, 14, '#bb2000');
  px(x+16, y+56, 6, 14, '#aa1a00');
  px(x+22, y+56, 6, 12, '#993300');

  // ── STAN-STYLE ANIMATED ARMS ──
  // Left arm — upper arm segment
  ctx.save();
  ctx.translate((x-2)*S, (y+28)*S);
  ctx.rotate(lArmAngle);
  ctx.fillStyle = '#cc2200';
  ctx.fillRect(-6*S, -3*S, 18*S, 6*S); // upper arm
  // Forearm
  ctx.translate(-6*S, 0);
  ctx.rotate(Math.sin(t / 60) * 0.5);
  ctx.fillRect(-14*S, -3*S, 14*S, 6*S); // forearm
  // Left claw at end of arm
  ctx.fillStyle = '#dd3300';
  ctx.fillRect(-22*S, -5*S, 10*S, 6*S); // upper pincer
  ctx.fillStyle = '#bb1e00';
  ctx.fillRect(-22*S, 1*S, 10*S, 5*S);  // lower pincer
  ctx.fillStyle = '#ff4422';
  ctx.fillRect(-24*S, -1*S, 2*S, 4*S);  // claw gap
  ctx.restore();

  // Right arm — upper arm segment
  ctx.save();
  ctx.translate((x+32)*S, (y+28)*S);
  ctx.rotate(rArmAngle);
  ctx.fillStyle = '#cc2200';
  ctx.fillRect(0, -3*S, 18*S, 6*S); // upper arm
  // Forearm
  ctx.translate(18*S, 0);
  ctx.rotate(Math.cos(t / 55 + 1) * 0.5);
  ctx.fillRect(0, -3*S, 14*S, 6*S); // forearm
  // Right claw
  ctx.fillStyle = '#dd3300';
  ctx.fillRect(12*S, -5*S, 10*S, 6*S);
  ctx.fillStyle = '#bb1e00';
  ctx.fillRect(12*S, 1*S, 10*S, 5*S);
  ctx.fillStyle = '#ff4422';
  ctx.fillRect(22*S, -1*S, 2*S, 4*S);
  ctx.restore();

  // Apple Watch on left wrist (follows arm animation roughly)
  const watchX = x - 16 + Math.cos(t / 110) * 8;
  const watchY = y + 26 + Math.sin(t / 90) * 6;
  if (mood === 'typing' || mood === 'triumphant') {
    const watchColor = (t % 400) < 200 ? '#33ff66' : '#ff3366';
    px(Math.round(watchX), Math.round(watchY), 5, 4, watchColor);
  } else {
    px(Math.round(watchX), Math.round(watchY), 5, 4, '#333');
  }

  // Human head poking out top of lobster suit
  // Neck
  px(x+9, y+10, 12, 10, '#e8b88a');

  // Head (slightly bigger for center-stage presence)
  px(x+5, y-16, 20, 26, '#e8b88a');

  // Hair
  px(x+5, y-16, 20, 6, '#1a0a00');
  px(x+3, y-14, 4, 10, '#1a0a00');
  px(x+23, y-14, 4, 6, '#1a0a00');

  // Garry's glasses (bigger, more prominent)
  px(x+7, y-3, 7, 5, '#111');   // left lens
  px(x+16, y-3, 7, 5, '#111');  // right lens
  px(x+14, y-2, 2, 3, '#666');  // bridge
  px(x+5, y-1, 2, 2, '#555');   // left arm of glasses
  px(x+23, y-1, 2, 2, '#555');  // right arm of glasses

  // Eyes behind glasses (with slight animation)
  const eyeShift = Math.round(Math.sin(t / 2000) * 1); // slow eye drift
  px(x+9+eyeShift, y-1, 3, 2, '#222');
  px(x+18+eyeShift, y-1, 3, 2, '#222');

  // Mouth / expression
  if (mood === 'normal') {
    px(x+11, y+5, 8, 2, '#c09070');
  } else if (mood === 'typing') {
    // Talking while typing — mouth animates
    const mouthOpen = Math.sin(t / 100) > 0 ? 3 : 1;
    px(x+11, y+5, 8, mouthOpen, '#c09070');
    if (mouthOpen > 1) px(x+12, y+6, 6, 1, '#222');
  } else if (mood === 'shocked') {
    px(x+11, y+4, 8, 4, '#c09070'); // big open mouth
    px(x+12, y+5, 6, 2, '#222');
  } else if (mood === 'triumphant') {
    // Wide grin
    px(x+9, y+5, 12, 3, '#ff9966');
    px(x+9, y+8, 2, 2, '#ff9966');
    px(x+19, y+8, 2, 2, '#ff9966');
    // Teeth
    px(x+11, y+6, 8, 1, '#eee');
  } else if (mood === 'excited') {
    px(x+10, y+4, 10, 4, '#ff9966');
    px(x+11, y+5, 8, 2, '#eee');
  }

  // Antennae (with slight wobble)
  const antWobbleL = Math.sin(t / 200) * 3;
  const antWobbleR = Math.cos(t / 180) * 3;
  ctx.strokeStyle = '#cc2200';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo((x+10)*S, (y-16)*S); ctx.lineTo((x+2+antWobbleL)*S, (y-30)*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo((x+20)*S, (y-16)*S); ctx.lineTo((x+28+antWobbleR)*S, (y-30)*S); ctx.stroke();

  // Antennae tips (little bobbles)
  px(x+1+Math.round(antWobbleL), y-32, 4, 4, '#ff4422');
  px(x+27+Math.round(antWobbleR), y-32, 4, 4, '#ff4422');

  // "YC Partner" badge on lobster suit
  ctx.fillStyle = '#ff6600';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('YC PARTNER', (x-6)*S, (y+78)*S);
}

function drawPlayer(x, y, mood) {
  // ── Body: T-shirt that says "startup.ai" ──
  px(x+2, y+20, 26, 32, '#eeeeee');  // white t-shirt
  px(x+4, y+20, 22, 32, '#f5f5f5');  // t-shirt highlight

  // T-shirt text "startup.ai"
  ctx.fillStyle = '#333';
  ctx.font = 'bold 7px monospace';
  ctx.fillText('startup', (x+5)*S, (y+32)*S);
  ctx.fillStyle = '#ff6600';
  ctx.fillText('.ai', (x+5 + 24)*S, (y+32)*S);

  // T-shirt sleeves
  px(x-2, y+20, 6, 10, '#eeeeee');
  px(x+26, y+20, 6, 10, '#eeeeee');

  // Arms (skin below sleeves)
  px(x-2, y+30, 5, 16, '#e8b88a');
  px(x+27, y+30, 5, 16, '#e8b88a');
  // Hands
  px(x-3, y+44, 7, 6, '#e8b88a');
  px(x+27, y+44, 7, 6, '#e8b88a');

  // Dark blue jeans
  px(x+4, y+52, 9, 24, '#1a2744');
  px(x+17, y+52, 9, 24, '#1a2744');
  // Jean seams
  px(x+8, y+52, 1, 24, '#15203a');
  px(x+21, y+52, 1, 24, '#15203a');

  // Allbirds sneakers (wool-textured gray-green)
  px(x+3, y+76, 11, 5, '#8a9a7a');  // left shoe
  px(x+16, y+76, 11, 5, '#8a9a7a'); // right shoe
  // Sole
  px(x+3, y+80, 11, 2, '#ddd');
  px(x+16, y+80, 11, 2, '#ddd');

  // Neck
  px(x+11, y+12, 8, 10, '#e8b88a');

  // Head
  px(x+7, y-10, 16, 22, '#e8b88a');

  // Hair
  px(x+7, y-10, 16, 5, '#4a2800');
  px(x+5, y-8, 4, 7, '#4a2800');
  px(x+21, y-8, 4, 5, '#4a2800');

  // ── Face expression based on vibes ──
  if (mood === 'happy' || mood === 'confident') {
    // Happy eyes
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // Smile
    px(x+10, y+7, 10, 2, '#c09070');
    px(x+10, y+9, 2, 1, '#c09070');
    px(x+18, y+9, 2, 1, '#c09070');
    // Sparkle
    ctx.fillStyle = '#ffff00';
    ctx.font = '6px monospace';
    ctx.fillText('★', (x+23)*S, (y)*S);
  } else if (mood === 'nervous') {
    // Worried eyes
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // Flat mouth
    px(x+11, y+7, 8, 2, '#c09070');
    // Sweat drop
    px(x+24, y-2, 2, 5, '#88aaff');
  } else if (mood === 'shocked') {
    // Wide eyes
    px(x+9, y+1, 5, 5, '#fff');
    px(x+16, y+1, 5, 5, '#fff');
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // O mouth
    px(x+12, y+7, 6, 4, '#c09070');
    px(x+13, y+8, 4, 2, '#222');
  } else if (mood === 'defeated') {
    // Sad droopy eyes
    px(x+10, y+3, 3, 2, '#111');
    px(x+17, y+3, 3, 2, '#111');
    // Eyebrow droop
    px(x+9, y+1, 5, 1, '#c09060');
    px(x+16, y+1, 5, 1, '#c09060');
    // Frown
    px(x+10, y+9, 10, 2, '#c09070');
    px(x+10, y+7, 2, 2, '#c09070');
    px(x+18, y+7, 2, 2, '#c09070');
    // Tears
    px(x+10, y+6, 2, 4, '#88aaff');
    px(x+19, y+6, 2, 4, '#88aaff');
  } else if (mood === 'pitch') {
    // Talking eyes
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    // Talking mouth (animates)
    const t = Date.now();
    const mOpen = Math.sin(t / 120) > 0 ? 3 : 1;
    px(x+11, y+7, 8, mOpen, '#c09070');
    if (mOpen > 1) px(x+12, y+8, 6, 1, '#222');
  } else {
    // Default neutral
    px(x+10, y+2, 3, 3, '#111');
    px(x+17, y+2, 3, 3, '#111');
    px(x+11, y+7, 8, 2, '#c09070');
  }
}

// ─── CHIPTUNE ENGINE (Web Audio API) ──────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let chiptuneStarted = false;

function startChiptune() {
  if (chiptuneStarted) return;
  chiptuneStarted = true;
  audioCtx = new AudioCtx();

  const masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.18;
  masterGain.connect(audioCtx.destination);

  // Musical notes (frequencies)
  const C4=261.63, D4=293.66, E4=329.63, F4=349.23, G4=392.00, A4=440.00, B4=493.88;
  const C5=523.25, D5=587.33, E5=659.25, G3=196.00, A3=220.00, B3=246.94, F3=174.61;
  const C3=130.81, D3=146.83, E3=164.81;

  // Main melody — jaunty, adventurous, LucasArts-ish
  const melody = [
    E4,E4,0,G4, A4,A4,0,B4, C5,B4,A4,G4, A4,0,E4,0,
    D4,D4,0,F4, G4,G4,0,A4, B4,A4,G4,F4, E4,0,C4,0,
    E4,G4,A4,C5, B4,A4,G4,E4, D4,F4,G4,B4, A4,G4,E4,D4,
    C4,E4,G4,C5, D5,C5,B4,A4, G4,A4,B4,G4, C5,0,0,0,
  ];

  // Bass line
  const bass = [
    C3,0,C3,0, C3,0,G3,0, F3,0,F3,0, F3,0,C3,0,
    G3,0,G3,0, G3,0,D3,0, A3,0,A3,0, E3,0,C3,0,
    C3,0,E3,0, G3,0,C3,0, D3,0,F3,0, G3,0,G3,0,
    C3,0,E3,0, F3,0,A3,0, G3,0,G3,0, C3,0,0,0,
  ];

  // Arpeggio pattern (higher octave sparkle)
  const arp = [
    C5,E5,G4,E5, C5,G4,E5,C5, F4,A4,C5,A4, F4,C5,A4,F4,
    G4,B4,D5,B4, G4,D5,B4,G4, A4,C5,E5,C5, E4,G4,C5,G4,
    C5,G4,E5,G4, E4,C5,G4,E4, D5,B4,G4,B4, G4,D5,B4,G4,
    C5,E5,G4,C5, D5,A4,F4,D5, G4,B4,D5,G4, C5,0,E5,0,
  ];

  const bpm = 150;
  const noteLen = 60 / bpm / 2; // sixteenth notes
  const loopLen = melody.length * noteLen;

  function scheduleNote(freq, time, duration, type, gainVal, dest) {
    if (freq === 0) return;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    env.gain.setValueAtTime(gainVal, time);
    env.gain.exponentialRampToValueAtTime(0.001, time + duration * 0.9);
    osc.connect(env);
    env.connect(dest);
    osc.start(time);
    osc.stop(time + duration);
  }

  function scheduleLoop(startTime) {
    for (let i = 0; i < melody.length; i++) {
      const t = startTime + i * noteLen;
      // Melody — square wave (classic chiptune lead)
      scheduleNote(melody[i], t, noteLen * 0.8, 'square', 0.35, masterGain);
      // Bass — triangle wave (warm low end)
      scheduleNote(bass[i], t, noteLen * 0.9, 'triangle', 0.5, masterGain);
      // Arpeggio — pulse-ish square at lower volume
      scheduleNote(arp[i], t, noteLen * 0.4, 'square', 0.12, masterGain);
    }

    // Drums — noise-based kick and hi-hat
    for (let i = 0; i < melody.length; i++) {
      const t = startTime + i * noteLen;
      if (i % 8 === 0) {
        // Kick
        const kickOsc = audioCtx.createOscillator();
        const kickEnv = audioCtx.createGain();
        kickOsc.type = 'sine';
        kickOsc.frequency.setValueAtTime(150, t);
        kickOsc.frequency.exponentialRampToValueAtTime(30, t + 0.08);
        kickEnv.gain.setValueAtTime(0.6, t);
        kickEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        kickOsc.connect(kickEnv);
        kickEnv.connect(masterGain);
        kickOsc.start(t);
        kickOsc.stop(t + 0.12);
      }
      if (i % 4 === 2) {
        // Hi-hat (short noise burst)
        const bufSize = audioCtx.sampleRate * 0.03;
        const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
        const data = buf.getChannelData(0);
        for (let s = 0; s < bufSize; s++) data[s] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource();
        noise.buffer = buf;
        const hhEnv = audioCtx.createGain();
        hhEnv.gain.setValueAtTime(0.15, t);
        hhEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
        // High-pass to make it sizzle
        const hp = audioCtx.createBiquadFilter();
        hp.type = 'highpass';
        hp.frequency.value = 8000;
        noise.connect(hp);
        hp.connect(hhEnv);
        hhEnv.connect(masterGain);
        noise.start(t);
        noise.stop(t + 0.05);
      }
    }
  }

  // Schedule first two loops, then keep scheduling
  let nextLoopTime = audioCtx.currentTime + 0.1;
  scheduleLoop(nextLoopTime);
  scheduleLoop(nextLoopTime + loopLen);
  nextLoopTime += loopLen * 2;

  setInterval(() => {
    if (audioCtx.currentTime > nextLoopTime - loopLen) {
      scheduleLoop(nextLoopTime);
      nextLoopTime += loopLen;
    }
  }, 500);
}

}

let activeTree = tree; // default to original

// ─── SCENARIO SELECT ──────────────────────────────────────────────────────────
function pickRandomScenario() {
  const meta = scenarioMeta[Math.floor(Math.random() * scenarioMeta.length)];
  activeTree = meta.key === 'original' ? tree : scenarioTrees[meta.key];
  return meta;
}

// ─── GAME LOGIC ───────────────────────────────────────────────────────────────
function setVibes(v) {
  vibes = Math.max(0, Math.min(100, v));
  const pct = vibes + '%';
  document.getElementById('yc-meter-fill').style.width = pct;
  document.getElementById('yc-meter-pct').textContent = vibes + '%';
}

function typeText(text, cb) {
  const el = document.getElementById('dialogue-text');
  const ind = document.getElementById('typing-indicator');
  el.textContent = '';
  ind.style.display = 'inline';
  let i = 0;
  clearInterval(typeTimer);
  typeTimer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) {
      clearInterval(typeTimer);
      ind.style.display = 'none';
      if (cb) cb();
    }
  }, 18);
}

function renderNode(nodeId) {
  currentNode = nodeId;
  const node = activeTree[nodeId];

  if (node.outcome) {
    showOutcome(node.outcome, node.reason);
    return;
  }

  // Apply vibes
  if (node.vibesDelta) setVibes(vibes + node.vibesDelta);

  // Update moods — reactive to vibes level
  // Garry: impressed when vibes high, skeptical when low
  if (vibes >= 70) { garryMood = 'triumphant'; }
  else if (vibes >= 40) { garryMood = node.garry || 'normal'; }
  else if (vibes >= 20) { garryMood = node.garry || 'typing'; }
  else { garryMood = node.garry === 'shocked' ? 'shocked' : 'typing'; }

  // Player: confident when vibes high, nervous/defeated when low
  if (vibes >= 60) { playerMood = 'happy'; }
  else if (vibes >= 30) { playerMood = node.player || 'pitch'; }
  else if (vibes >= 10) { playerMood = node.player || 'nervous'; }
  else { playerMood = vibes <= 0 ? 'defeated' : 'nervous'; }

  drawScene(garryMood, playerMood);

  // Speaker name
  document.getElementById('speaker-name').textContent = node.speaker || 'GARRY TAN';

  // Type dialogue
  typeText(node.text, () => {
    // Render choices
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    (node.choices || []).forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice.text;
      btn.addEventListener('click', () => {
        const nextId = choice.next;
        const nextNode = activeTree[nextId];
        // Apply choice-level vibes delta
        if (choice.vibesDelta) setVibes(vibes + choice.vibesDelta);
        // Check if outcome
        if (choice.isOutcome || (nextNode && nextNode.outcome)) {
          renderNode(nextId);
        } else {
          renderNode(nextId);
        }
      });
      container.appendChild(btn);
    });
  });
}

function showOutcome(type, reason) {
  // Clear dialogue
  document.getElementById('dialogue-text').textContent = '';
  document.getElementById('speaker-name').textContent = '';
  document.getElementById('choices-container').innerHTML = '';
  document.getElementById('typing-indicator').style.display = 'none';

  if (type === 'win') {
    garryMood = 'triumphant';
    playerMood = 'confident';
    setVibes(100);
    drawScene(garryMood, playerMood);

    const winCompany = activeTree.win && activeTree.win.company ? activeTree.win.company : 'your company';

      'He reaches across the desk with one claw. You shake it. It\'s firmer than you expected. Warmer too.<br><br>' +
      `<span style="color:#ff9933">"Don't make me regret this. Now go build ${winCompany}."</span><br><br>` +
      '<em style="color:#666">You have been accepted to Y Combinator Spring \'26. The lobster suit was never explained.</em>';

    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '▶ NEW COMPANY';
    btn.addEventListener('click', resetGame);
    document.getElementById('choices-container').appendChild(btn);

  } else {
    garryMood = 'typing';
    playerMood = 'defeated';
    setVibes(Math.max(0, vibes - 20));
    drawScene(garryMood, playerMood);

    document.getElementById('dialogue-text').innerHTML =
      '<span style="color:#ff3333;font-size:16px;font-weight:bold;">✗ NOT ADMITTED</span><br><br>' +
      (reason || 'You have no moat.') + '<br><br>' +
      '<em style="color:#666">Thank you for playing. Garry is already building your replacement.</em>';

    const btn = document.createElement('button');
    btn.id = 'restart-btn';
    btn.textContent = '▶ NEW COMPANY';
    btn.addEventListener('click', resetGame);
    document.getElementById('choices-container').appendChild(btn);
  }
}

function resetGame() {
  vibes = 0;
  setVibes(0);
  garryMood = 'normal';
  playerMood = 'nervous';
  const meta = pickRandomScenario();
  document.getElementById('title-bar').textContent = `LOBSTER PITCH: ${meta.label.toUpperCase()} — A YC ADVENTURE`;
  renderNode('start');
}

// ─── ANIMATION LOOP (Stan-style arms always animate) ─────────────────────────
function animLoop() {
  drawScene(garryMood, playerMood);
  animFrame = requestAnimationFrame(animLoop);
}

// ─── START ────────────────────────────────────────────────────────────────────
drawScene('normal', 'nervous');
const _initMeta = pickRandomScenario();
document.getElementById('title-bar').textContent = `LOBSTER PITCH: ${_initMeta.label.toUpperCase()} — A YC ADVENTURE`;
renderNode('start');
animLoop();
</script>
</body>
</html>
